# @package _global_
# 없으면 Hydra가 이 파일을 experiment 패키지 아래로 묶어 model 병합이 깨짐
# (ConfigCompositionException: Could not override 'model@experiment.model').

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 5e-5
    lr_warmup_steps: 200
    lr_total_steps: -1
    lr_min_ratio: 1e-2
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 16
    # validation 시 official SimAgents RMM (CPU 풀) + 비디오: batch_idx < n_vis_batch 일 때만
    n_batch_sim_agents_metric: 10
    # hard: PyTorch 인-프로세스 RMM — subprocess 없어 훨씬 빠름 (값은 real과 동등)
    validation_metric: hard
    wosac_torch_compile: true
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    val_open_loop: true
    val_closed_loop: true
    # Flow ODE 적분 스텝 (기본 smart_flow.yaml 은 16; 여기서 실험 프리셋만 덮어씀)
    decoder:
      flow_solver_steps: 4
    kinematic_projection:
      enabled: false
    finetune:
      enabled: true
      mode: rmm_bptt_ft
      # null/0 이하 = coarse 전부 (16). 양수 = 그 coarse step만 rollout·전 구간 역전파 (예: 짧은 구간 3)
      bptt_max_coarse_steps: null
      rollout_noise_scale: 1.0
      bptt_n_rollouts: 2
      rmm_bptt_use_ref_model: false
      # true: HierarchicalFlowDecoder.velocity_head만 학습 (FinetuneConfig 코드 기본과 동일)
      flow_velocity_head_only: true
      # true: flow ODE generate() 내부 model_fn 호출을 gradient checkpoint으로 감쌈
      # (Neural ODE adjoint 이산 버전) — OOM 발생 시 활성화
      bptt_use_adjoint: false
      # pred_traj / pred_head_traj 에서 역전파되는 gradient L2 norm 상한 (norm clip).
      # element-wise clamp 와 달리 방향을 유지하면서 크기만 제한. 0 이하면 비활성.
      bptt_grad_clip_traj: 1.0
      # true: sim_features 극값과 per-metric likelihood 를 WARNING 로 출력 (디버깅용)
      bptt_debug: false
      # true: G rollout 을 순차 실행해 각각 즉시 backward → 피크 메모리 ≈ G 배 절감.
      # !! DDP 멀티-GPU 에서 사용 금지: G+1 backward 호출로 bucket reducer 오동작 → gradient=0.
      # precision=32-true 단일 GPU 환경에서만 안전. G=1 이면 효과 없음.
      bptt_sequential_rollouts: false
      # 앞 N coarse step 을 no_grad + detach (sliding-window BPTT).
      # 0 이하 = 비활성. 예: 12 → 마지막 4 step (bptt_max_coarse_steps=16 기준) 만 gradient.
      bptt_warm_coarse_steps: 0
      # true: training step 마다 ref model G rollout (no_grad) → train/rmm_ref + train/rmm_delta 로깅.
      rmm_bptt_ref_train: false
      # true: validation 시 pretrained ref model 도 동일 조건으로 rollout →
      # val_ref/rmm 과 val_delta/rmm (= finetuned - pretrained) 로깅.
      # validation 시간 ≈ 2배. noise 는 자동으로 정합.
      rmm_bptt_ref_val: false

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  # 학습 배치(스텝) 5번마다 validation 전체 루프 → official RMM + (n_vis_*) 비디오
  check_val_every_n_epoch: null
  val_check_interval: 5
  max_epochs: 10
  log_every_n_steps: 1
  precision: 32-true
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    # kinematic off 이면 val_kinematic/* 가 없음 → closed-loop 메타메트릭 사용
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_top_k: -1

data:
  train_batch_size: 16
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 1
  # rmm_bptt_ft 는 시나리오별 Waymo bytes(`*.tfrecords`)가 필요합니다. pickle은
  #   {cache_root}/{split}/*.pkl
  # 대응 tfrecord는 (전처리 ``--write_tfrecords always`` 시)
  #   {cache_root}/{split}_tfrecords_splitted/{scenario_id}.tfrecords
  # 기존 pickle 의 ``scenario_id`` 와 파일명이 1:1 이므로, tfrecord 경로는 유추 가능합니다.
  # (bytes 자체는 원본 WOMD 샤드에서 다시 쓰거나 전처리 재실행으로 생성)
  #
  # 기본: validation 만 tfrecord를 켠 레거시 캐시와 맞춤 (train/val 동일 원천 → leakage 주의).
  # plain training/ pickle 만 쓰는 트리와 겹치지 않게 하려면 전처리에서
  #   --split training --output_split closed_loop_train --write_tfrecords always
  # 로 ``closed_loop_train/`` + ``closed_loop_train_tfrecords_splitted/`` 를 만들고
  # train_raw_dir / train_tfrecords_splitted 를 그쪽으로 맞추면 됩니다.
  #
  # 또는 ``training/`` + ``training_tfrecords_splitted/`` 를 직접 만들었으면 아래 두 줄을
  # training / training_tfrecords_splitted 로 바꾸거나 커맨드라인에서 오버라이드하세요.
  train_raw_dir: ${paths.cache_root}/validation
  train_tfrecords_splitted: ${paths.cache_root}/validation_tfrecords_splitted
  train_use_val_transform: true
