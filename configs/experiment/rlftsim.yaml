# @package _global_

defaults:
  - override /model: smart

model:
  model_config:
    lr: 3e-6
    lr_warmup_steps: 100
    lr_total_steps: 0
    lr_min_ratio: 0.05
    weight_decay: 0.01
    n_rollout_closed_val: 32
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    val_open_loop: false
    val_closed_loop: true
    validation_rollout_sampling:
      criterium: topk_prob
      num_k: 32
      temp: 1.0
    training_rollout_sampling:
      criterium: topk_prob
      num_k: 32
      temp: 1.0
    rlftsim:
      enabled: true
      train_rollouts_per_scenario: 4
      wosac_version: "2025"
      ego_only: false
      reward_scale: 1.0
      normalize_rewards: false
      entropy_bonus: 0.0
      kl_initial_beta: 0.01
      kl_target: 0.01
      kl_horizon: 5
      kl_min: 1e-3
      kl_max: 1e3
      reference_sync_steps: 500
      reference_sync_alpha: 0.005
      accumulate_grad_batches: 1
      gradient_clip_val: 1.0
      gradient_clip_algorithm: norm
      replay_rollout_chunk_size: 4
      sampling:
        criterium: topk_prob
        num_k: 32
        temp: 1.0
    finetune: false

ckpt_path: BC_PRETRAINED_MODEL.ckpt

trainer:
  max_epochs: 1
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 1
  gradient_clip_val: 0.0

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 8
  val_batch_size: 8
  test_batch_size: 8
  num_workers: 8
  train_use_eval_agent_selection: true
  train_tfrecords_splitted: ${paths.cache_root}/training_tfrecords_splitted

action: rlftsim_finetune
