# @package _global_
# Local single-GPU debug run for kinematic_reward_ft fine-tuning.
# GPU 2 or 3 사용 (CUDA_VISIBLE_DEVICES=2 또는 3).

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    n_batch_sim_agents_metric: 10
    val_open_loop: true
    val_closed_loop: false
    n_rollout_closed_val: 8
    kinematic_projection:
      enabled: true
    finetune:
      enabled: true
      mode: kinematic_reward_ft
      rollout_steps: 4
      rollout_noise_scale: 1.0
      flow_reg_lambda: 0.0
      reward_huber_beta: 0.05

ckpt_path: null

trainer:
  limit_train_batches: 10
  limit_val_batches: 2
  check_val_every_n_epoch: 1
  max_epochs: 3
  log_every_n_steps: 1
  precision: 32-true
  gradient_clip_val: 1.0

data:
  train_batch_size: 4
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 2
