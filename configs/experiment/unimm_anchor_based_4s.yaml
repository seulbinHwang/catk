# @package _global_

defaults:
  - override /model: unimm_anchor_based_4s

action: fit
ckpt_path: null

trainer:
  max_epochs: 30
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 1
  precision: bf16-mixed
  gradient_clip_val: 0.5

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  # Paper batch size is 32 scenes globally. With svvvv-2-{1..4}
  # (4 nodes x 2 GPUs), this is 4 scenes per rank.
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 10
  train_use_eval_agent_selection: true
  road_num_rollouts_per_scenario: 1

model:
  model_config:
    lr: 0.0005
    weight_decay: 0.0001
    lr_total_steps: ${trainer.max_epochs}
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
