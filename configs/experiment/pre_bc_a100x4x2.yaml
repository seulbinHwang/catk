# @package _global_

# SMART NTP pretrain preset for two A100/H100 x4 nodes.
#
# This config intentionally keeps the SMART model, deterministic nearest-token
# tokenization, and loss from `pre_bc`. The fit-time closed-loop validation
# sampling is aligned with WOSAC submission by using top-12 candidates. The
# remaining training/runtime recipe is aligned with
# the x4x2 flow-control pretrain recipe used on semi_control_stable:
#   * 2 nodes
#   * 4 A100/H100 GPUs per node
#   * 8 total DDP ranks
#   * train_batch_size 16 * 8 GPUs = effective global batch 128
#   * lr=6e-4, warmup=4, lr_min_ratio=1e-2
#   * fast RMM scorer uses about 1680 validation scenarios every 16 epochs

defaults:
  - pre_bc
  - _self_

model:
  model_config:
    lr: 6e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    scorer_scene_num: 1680
    n_rollout_closed_val: 32
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    validation_rollout_sampling:
      criterium: topk_prob
      num_k: 12
      temp: 1.0

trainer:
  devices: 4
  num_nodes: 2
  enable_progress_bar: true
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 16
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  accumulate_grad_batches: 1
  use_distributed_sampler: false

callbacks:
  tqdm_progress_bar:
    _target_: lightning.pytorch.callbacks.TQDMProgressBar
    refresh_rate: 1
    process_position: 0
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 16
  val_batch_size: 12
  test_batch_size: 12
  num_workers: 4
  train_use_eval_agent_selection: false
  random_scene_scale_config: null
  random_time_shift_config: null
  train_memory_balanced_batching: true
  train_memory_balance_metadata_num_workers: 8
  train_memory_balance_weight_key: agent_quadratic
  train_memory_balance_bucket_size_multiplier: 50
