# @package _global_

# SMART NTP pretrain preset for two A100x4 nodes.
#
# This config intentionally keeps the SMART model, tokenization, loss, and
# sampling logic from `pre_bc`. Only the training/runtime recipe is aligned with
# the A100x4x2 flow-control pretrain recipe used on semi_control_stable:
#   * 2 nodes
#   * 4 A100 80GB GPUs per node
#   * 8 total DDP ranks
#   * train_batch_size 20 * 8 GPUs = effective global batch 160
#   * lr=6e-4, warmup=4, lr_min_ratio=1e-2

defaults:
  - pre_bc
  - _self_

model:
  model_config:
    lr: 6e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 16
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0

trainer:
  devices: 4
  num_nodes: 2
  enable_progress_bar: true
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 32
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  accumulate_grad_batches: 1
  use_distributed_sampler: false

callbacks:
  tqdm_progress_bar:
    _target_: lightning.pytorch.callbacks.TQDMProgressBar
    refresh_rate: 1
    process_position: 0
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 20
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  train_use_eval_agent_selection: true
  train_memory_balanced_batching: true
  train_memory_balance_metadata_num_workers: 8
  train_memory_balance_weight_key: agent_quadratic
  train_memory_balance_bucket_size_multiplier: 50
