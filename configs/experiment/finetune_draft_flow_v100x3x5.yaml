# @package _global_

# ============================================================================
# DRaFT inverse-feasibility fine-tuning preset for 5 static V100x3 pods.
#
# Target static pods:
#   fv, fvv, fvvv, fvvvv, fvvvvv
#
# This preset intentionally keeps the DRaFT physics objective conservative:
#   * soft pre-limit buffer: soft_limit_ratio=0.8
#   * no commit-window reweighting: commit_loss_weight=1.0
#   * no slip penalty: use_slip_penalty=false
#   * topk_violation_k=20, which is equivalent to full-horizon mean when
#     decoder.flow_window_steps=20 and becomes active if the horizon is longer.
# ============================================================================

defaults:
  - finetune_draft_flow
  - _self_

trainer:
  num_nodes: 5
  devices: 3
  precision: 16-mixed
  accumulate_grad_batches: 1

model:
  model_config:
    # Keep the base 6xH100 DRaFT fine-tuning LR. With bs=24 x 15 ranks the
    # effective global batch is 360, so this is conservative vs. linear scaling.
    lr: 2.0e-4
    # Validation is distributed across 15 ranks; keep scorer parallelism modest
    # so the V100 pods spend memory on rollout/model work rather than workers.
    n_batch_sim_agents_metric: 10
    sim_agents_metric_workers: 1
    draft:
      enabled: true
      loss_enabled: true
      max_weight: 0.15
      physics:
        use_slip_penalty: true
        commit_loss_weight: 1.0
        soft_limit_ratio: 0.9
        topk_violation_k: 20

data:
  # Per-GPU batch. A100-80GB bs=64 gives a linear memory-ratio estimate
  # 64 * 32 / 80 = 25.6; bs=24 leaves a small but useful margin.
  train_batch_size: 24
  # Closed-loop validation can be memory-heavy because it materializes rollouts.
  # Keep this lower than the A100 preset.
  val_batch_size: 2
  test_batch_size: 2
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
