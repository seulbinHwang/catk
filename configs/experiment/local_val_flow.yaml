# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    # scorer_scene_num is the authoritative Fast WOSAC budget. Keep the
    # explicit batch knob at 0 so it cannot look like an independent setting.
    n_batch_sim_agents_metric: 0
    scorer_scene_num: 1680
    val_open_loop: true
    val_closed_loop: true
    n_rollout_closed_val: 32
    eval_sampling_noise:
      noise_scale: 1.0

ckpt_path: YOUR_MODEL.ckpt

trainer:
  limit_train_batches: 1.0
  # Single-GPU default: 1680 scenes / val_batch_size 4 = 420 batches.
  limit_val_batches: 420
  limit_test_batches: 1.0
  check_val_every_n_epoch: 2
  precision: bf16-mixed
  gradient_clip_val: 5.0

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4

action: validate
