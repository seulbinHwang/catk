# @package _global_

# SiD-lite self-forcing fine-tuning preset.
# 기존 self_forced_npfm 설정을 유지하되 generator 분포 맞춤 loss만 SiD-style로 바꿉니다.
defaults:
  - self_forced_npfm
  - _self_

model:
  model_config:
    self_forced:
      distribution_matching_objective: sid
      sid_alpha: 1.0
      sid_normalizer_eps: 1.0e-3
      use_anchor_flow_matching_loss: false
      detach_block_transition: false
      unfrozen_range: except_map_encoder
      estimator_warmup_epochs: 0
      use_control_space_physics_regularization: false
