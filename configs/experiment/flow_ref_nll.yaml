# @package _global_
# Ref-NLL fine-tuning experiment config (closed-loop → open-loop likelihood).
# 알고리즘:
#   1. Closed-loop generation (BPTT): 0.5s 씩 commit 하며 pred_max_steps × 0.5s
#      만큼 굴려 world-frame 의 2s 궤적을 모은다.
#   2. 모은 2s 궤적을 rollout 시작 시점 pose 의 local frame 으로 변환해 단일
#      x₁ (= [n_active, 20, 4]) 을 만든다.
#   3. Frozen open-loop ref 로 backward ODE + Hutchinson 발산 추정 →
#      log p_ref(τ_2s | initial_anchor) 와 ∂ log p_ref / ∂ x₁ 계산.
#   4. Straight-through loss: L = -mean(∂ log p_ref / ∂ x₁ · x₁)
#      → gradient 가 x₁ → pred_traj_10hz → flow_ode → θ 로 BPTT 역전파 (closed-loop
#      AR joint likelihood 를 open-loop p(τ|initial) 로 끌어올리는 covariate-shift 보정).

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 5e-6
    lr_warmup_steps: 0
    lr_total_steps: -1
    lr_min_ratio: 0.1
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 4
    n_batch_sim_agents_metric: 2
    validation_metric: hard
    wosac_torch_compile: true
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    val_open_loop: true
    val_closed_loop: true
    decoder:
      flow_solver_steps: 4
    kinematic_projection:
      enabled: false
    finetune:
      enabled: true
      mode: ref_nll_ft
      # ── Ref-NLL 핵심 파라미터 ─────────────────────────────────────────────
      # G: 시나리오당 closed-loop rollout 수
      ref_nll_n_rollouts: 2
      # coarse step 수 (1 step = 0.5s; 4 steps = 2s)
      ref_nll_pred_max_steps: 4
      # Hutchinson 발산 추정 횟수 (1 = 빠름·편향 없음)
      ref_nll_n_hutch_samples: 1
      # False (기본, 권장): 발산 항 gradient 없음 (선형 근사)
      # True: 발산 항까지 2차 미분 → 더 정확하지만 메모리·시간 증가
      ref_nll_use_full_div_grad: false
      # GT FM regularization 가중치 (0 = 비활성)
      ref_nll_fm_reg_lambda: 0.0
      # 전체 loss 스케일
      ref_nll_loss_scale: 1.0
      # ── BPTT tricks ────────────────────────────────────────────────────────
      flow_velocity_head_only: true
      bptt_use_adjoint: false
      bptt_grad_clip_traj: 1.0
      bptt_warm_coarse_steps: 0
      bptt_last_n_solver_steps: 0
      rollout_noise_scale: 1.0
      # GT flow-matching 정규화 (optional)
      flow_reg_lambda: 0.0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  check_val_every_n_epoch: null
  val_check_interval: 500
  max_epochs: 10
  log_every_n_steps: 1
  precision: 32-true
  gradient_clip_val: 0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_top_k: -1

data:
  train_batch_size: 8
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 1
  train_raw_dir: ${paths.cache_root}/validation
  train_tfrecords_splitted: ${paths.cache_root}/validation_tfrecords_splitted
  train_use_val_transform: true
