# @package _global_

# ============================================================================
# Self-Forced NPFM fine-tuning preset for 8 nodes x 4 V100 32GB.
#
# Target static pods:
#   testsv, testsvv, testsvvv, testsvvvv, sv, svv, svvv, svvvv
#
# This preset is meant for the V100 32GB multi-node run that starts from the
# W&B artifact `jksg01019-naver-labs/SMART-FLOW/epoch-last-g3zr84tp:v64`.
# The launcher downloads that artifact to:
#   /workspace/flow_semi_continuous_pretrain_h100x4x2_bs26/v64/epoch_last.ckpt
#
# Main experiment points:
#   * 32 total DDP ranks: trainer.num_nodes=8, trainer.devices=4
#   * V100-safe precision: 16-mixed
#   * Generator lr: 1e-6
#   * self_forced.estimator_warmup_epochs=0
#   * self_forced.use_stop_motion=false for the training self-rollout
# ============================================================================

defaults:
  - self_forced_npfm_h100_4
  - _self_

trainer:
  num_nodes: 8
  devices: 4
  precision: 16-mixed
  max_epochs: 12
  check_val_every_n_epoch: 2

model:
  model_config:
    lr: 1.0e-6
    # Keep the validation scorer workload stable across the 32-rank run:
    # ceil(ceil(1680 / 32) / val_batch_size=2) = 27 Fast WOSAC scorer batches.
    scorer_scene_num: 1680
    self_forced:
      use_stop_motion: false
      estimator_warmup_epochs: 1

data:
  # V100 32GB self-forced runs have a much tighter memory envelope than H100.
  # Start conservatively; the launcher can step down on OOM.
  train_batch_size: 2
  val_batch_size: 2
  test_batch_size: 2
  num_workers: 8
  prefetch_factor: 1
