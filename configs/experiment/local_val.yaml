# @package _global_

defaults:
  - override /model: smart

model:
  model_config:
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    # Use scene count as the source of truth so DDP/world-size changes do not
    # silently fall back to the model default scorer subset.
    scorer_scene_num: 1680
    n_batch_sim_agents_metric: 105
    val_open_loop: false
    val_closed_loop: true
    decoder:
      num_freq_bands: 64
    validation_rollout_sampling:
      criterium: topk_prob
      num_k: 12 # for k most likely
      temp: 1.0

ckpt_path: YOUR_MODEL.ckpt

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 60
  limit_test_batches: 1.0
  check_val_every_n_epoch: 16

data:
  train_batch_size: 16
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 8

action: validate
