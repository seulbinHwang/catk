# @package _global_
defaults:
  - override /model: flow_smart

model:
  model_config:
    n_rollout_closed_val: 32
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    n_batch_wosac_metric: 0
    val_open_loop: false
    val_closed_loop: true
    wosac_submission:
      is_active: true
      method_name: "CATK-flow-tiny-7M"
      authors: [Anonymous]
      affiliation: YOUR_AFFILIATION
      description: YOUR_DESCRIPTION
      method_link: YOUR_METHOD_LINK
      account_name: YOUR_ACCOUNT_NAME

ckpt_path: YOUR_MODEL.ckpt

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  check_val_every_n_epoch: 1
  precision: bf16-mixed

data:
  train_batch_size: 12
  val_batch_size: 12
  test_batch_size: 12
  num_workers: 12
  shuffle: false
  pin_memory: false

action: validate
