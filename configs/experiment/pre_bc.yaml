# @package _global_

defaults:
  # - override /trainer: ddp
  - override /model: smart

model:
  model_config:
    lr: 5e-4
    lr_min_ratio: 1e-2
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    token_processor:
      map_token_sampling: # open-loop
        num_k: 1 # for k nearest neighbors
        temp: 1.0 # uniform sampling
      agent_token_sampling: # closed-loop
        num_k: 1 # for k nearest neighbors
        temp: 1.0
    decoder:
      num_freq_bands: 66

ckpt_path: null
# ckpt_path: CKPT_FOR_RESUME.ckpt # to resume training

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 16
  max_epochs: 64

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 10
  val_batch_size: 10
  test_batch_size: 10
  num_workers: 10
  train_use_eval_agent_selection: false
