# @package _global_

# ============================================================================
# DRaFT inverse-feasibility fine-tuning preset for 8 static V100x4 pods.
#
# Target static pods:
#   testsv, testsvv, testsvvv, testsvvvv, sv, svv, svvv, svvvv
#
# This preset uses the slip-penalty DRaFT physics objective requested for the
# 8x V100x4 run:
#   * exact physics limit onset: soft_limit_ratio=1.0
#   * no commit-window reweighting: commit_loss_weight=1.0
#   * slip penalty enabled: use_slip_penalty=true
#   * topk_violation_k=20, which is equivalent to full-horizon mean when
#     decoder.flow_window_steps=20 and becomes active if the horizon is longer.
# ============================================================================

defaults:
  - finetune_draft_flow
  - _self_

trainer:
  num_nodes: 8
  devices: 4
  precision: 16-mixed
  accumulate_grad_batches: 1

model:
  model_config:
    # Keep the base 6xH100 DRaFT fine-tuning LR. With bs=24 x 32 ranks the
    # effective global batch is 768, so this avoids silently changing optimizer
    # dynamics while only moving the preset onto the requested static pods.
    lr: 2.0e-4
    # Validation is distributed across 32 ranks; keep scorer parallelism modest
    # so the V100 pods spend memory on rollout/model work rather than workers.
    n_batch_sim_agents_metric: 10
    sim_agents_metric_workers: 1
    draft:
      enabled: true
      loss_enabled: true
      max_weight: 0.15
      physics:
        use_slip_penalty: true
        commit_loss_weight: 1.0
        soft_limit_ratio: 0.9
        topk_violation_k: 20

data:
  # Per-GPU batch. The user's completed A100x4 pod run used 320 GiB aggregate
  # memory at bs=64. A V100x4 pod has 128 GiB aggregate memory, giving the
  # first-order estimate 64 * 128 / 320 = 25.6; bs=24 keeps a small margin.
  train_batch_size: 24
  # Closed-loop validation can be memory-heavy because it materializes rollouts.
  # Keep this lower than the A100 preset.
  val_batch_size: 2
  test_batch_size: 2
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
