# @package _global_

defaults:
  - override /model: smart_flow
  - override /trainer: ddp

action: finetune

model:
  model_config:
    lr: 1e-4
    lr_warmup_steps: 1000
    lr_total_steps: -1
    lr_min_ratio: 1e-2
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 16
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    projected_generation:
      enabled: false
    finetune:
      enabled: true
      mode: terminal_cost_full_grad
      rollout_steps: 4          # training: 4-step OT-ODE (full BPTT)
      rollout_noise_scale: 1.0
      feasible_weight: 1.0
      smooth_deadzone_epsilon: [0.01, 0.01, 0.01]
      smooth_deadzone_tau: 0.002
      flow_reg_lambda: 1.0      # BC (Flow Matching) 정규화 가중치

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  check_val_every_n_epoch: 1
  max_epochs: 8
  log_every_n_steps: 5
  precision: 32-true
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_top_k: -1

data:
  train_batch_size: 8
  val_batch_size: 4
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
