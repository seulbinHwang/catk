# @package _global_

# ============================================================================
# DRaFT fine-tuning preset for 7x V100-SXM2 32GB (sm_70, Volta) per pod.
# This is the V100x7 sibling of `finetune_draft_flow_v100x8.yaml`.
# ----------------------------------------------------------------------------
# Intended static multi-node setup:
#   - `testv` and `testvv` are already running V100 pods
#   - use only GPU 0..6 in each pod with `torchrun --nproc_per_node 7`
#   - total training GPUs: 7 * 2 = 14
#
# Empirical policy:
#   `train_batch_size=36` and `accumulate_grad_batches=1` match the stable
#   V100x8 multi-node setting. For two V100x7 pods the effective global batch is:
#       36 * 14 GPUs * 1 = 504
#   Keep lr=2e-4 unless you intentionally run a separate LR sweep.
#   This preset is explicitly for the soft_limit_ratio=0.9 DRaFT experiment.
#
# V100 has FP16 tensor cores but no native BF16, so this preset uses
# `16-mixed` and lets Lightning/PyTorch GradScaler handle recoverable AMP
# overflow steps.
# ============================================================================

defaults:
  - override /model: smart_flow

model:
  model_config:
    # Optimizer / scheduler --------------------------------------------------
    lr: 2e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2

    # Validation ------------------------------------------------------------
    n_rollout_closed_val: 16
    n_batch_sim_agents_metric: 10
    sim_agents_metric_workers: 1
    val_open_loop: true
    val_closed_loop: true

    finetune:
      enabled: true
      train_full_flow_decoder_only: true

    draft:
      enabled: true
      loss_enabled: true
      start_epoch: 0
      ramp_epochs: 32
      max_weight: 0.2
      sampling:
        sample_steps: 32
        sample_method: euler
        noise_scale: 1.0
        # Stable with bs=36 / acc=1 on V100 multi-node runs. If a new box OOMs
        # on scene-variance spikes, prefer sweeping train_batch_size downward
        # before changing sampling semantics.
        backprop_last_k: 12
      physics:
        force_fp32: true
        dt: 0.1
        pos_scale_m: 20.0
        speed_floor_mps: 0.5
        vehicle_v_max_mps: 35.0
        vehicle_a_max_mps2: 8.0
        vehicle_lat_accel_max_mps2: 4.2
        bicycle_v_max_mps: 22.0
        bicycle_a_max_mps2: 5.5
        bicycle_lat_accel_max_mps2: 4.4
        pedestrian_v_max_mps: 5.0
        pedestrian_a_max_mps2: 4.7
        vehicle_wheelbase_scale: 0.60
        bicycle_wheelbase_scale: 0.85
        vehicle_steer_max_rad: 0.55
        bicycle_steer_max_rad: 0.90
        vehicle_steer_rate_max_radps: 0.8
        bicycle_steer_rate_max_radps: 1.4
        pedestrian_heading_weight: 0.05
        pedestrian_heading_speed_threshold_mps: 0.5
        soft_limit_ratio: 1.0
        topk_violation_k: 20
        eps: 1.0e-6

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  # Keep the same validation policy as the V100x8 preset while reducing the
  # number of DDP ranks per pod from 8 to 7.
  limit_val_batches: 0.1
  check_val_every_n_epoch: 16
  max_epochs: 32
  precision: 16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  accumulate_grad_batches: 1

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  # Per-GPU train batch. This intentionally matches the V100x8 default.
  train_batch_size: 36
  # Keep per-GPU validation footprint identical to V100x8.
  val_batch_size: 4
  test_batch_size: 4
  # 7 DDP ranks * 2 workers = 14 loader processes per V100x7 pod.
  num_workers: 2
  prefetch_factor: 2
  train_use_eval_agent_selection: true
