# @package _global_
# Experiment B: Closed-loop kinematic post-processing only.
# Standard 16-step ODE (no PPR). Bicycle LQR applied after each chunk generation.

defaults:
  - override /model: smart_flow

model:
  model_config:
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    n_batch_sim_agents_metric: 50
    val_open_loop: false
    val_closed_loop: true
    n_rollout_closed_val: 16
    eval_sampling_noise:
      noise_scale: 1.0
    kinematic_projection:
      enabled: true
      predict_project_renoise: false   # ODE without PPR
      use_bicycle_model: true
      wheelbase: 2.7
      delta_max: 0.52
      a_max: 4.0
      d_max: 8.0
      delta_rate_max: 0.6
      ped_a_max: 2.0
      eps: 1.0e-6
      use_lqr: true
      lqr_q_xy: 2.0
      lqr_q_yaw: 2.0
      lqr_q_v: 0.5
      lqr_q_delta: 0.2
      lqr_r_a: 0.2
      lqr_r_delta_rate: 0.2
      lqr_qf_scale: 2.0
    kinematic_postproc:
      enabled: true

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  precision: 32-true

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4
  prefetch_factor: 2

action: validate
