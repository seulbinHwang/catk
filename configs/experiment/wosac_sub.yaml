# @package _global_

defaults:
  # - override /trainer: ddp
  - override /model: smart

model:
  model_config:
    n_rollout_closed_val: 32
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    n_batch_sim_agents_metric: 0
    n_batch_wosac_metric: 0
    scorer_scene_num: 0
    val_open_loop: false
    val_closed_loop: true
    decoder:
      num_freq_bands: 66
    validation_rollout_sampling:
      criterium: topk_prob
      num_k: 48 # for k most likely
      temp: 1.0
    sim_agents_submission:
      is_active: true
      method_name: "SMART-NTP-7M"
      authors: [Seulbin Hwang, Kiyoung Om]
      affiliation: NaverLabs
      description: Next-token prediction baseline for simulating realistic agents.
      method_link: "not available yet"
      account_name: "h.sb@naverlabs.com"
      num_model_parameters: "7M"

ckpt_path: YOUR_MODEL.ckpt

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  check_val_every_n_epoch: 2
  precision: bf16-mixed
  gradient_clip_val: 5.0

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 8
  num_workers: 4
  prefetch_factor: 1
  shuffle: false
  pin_memory: true
  persistent_workers: true
