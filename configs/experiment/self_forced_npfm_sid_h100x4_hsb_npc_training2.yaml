# @package _global_

# ============================================================================
# Self-Forced SiD-lite NPFM fine-tuning preset for one 4x H100 pod:
# hsb-npc-training-2.
#
# The matching launcher downloads the W&B artifact
# `jksg01019-naver-labs/SMART-FLOW/epoch-last-g3zr84tp:v64` to:
#   /workspace/flow_semi_continuous_pretrain_h100x4x2_bs26/v64/epoch_last.ckpt
#
# Main experiment points:
#   * Single-node DDP: trainer.num_nodes=1, trainer.devices=4
#   * H100 precision: bf16-mixed
#   * Generator lr: 1e-6
#   * trainer.max_epochs=10, trainer.check_val_every_n_epoch=2
#   * self_forced.distribution_matching_objective=sid
#   * self_forced.estimator_warmup_epochs=1
#   * self_forced.use_stop_motion=false for the training self-rollout
#   * data.train_batch_size=28
# ============================================================================

defaults:
  - self_forced_npfm_sid_h100_4
  - _self_

trainer:
  num_nodes: 1
  devices: 4
  precision: bf16-mixed
  max_epochs: 10
  check_val_every_n_epoch: 2

model:
  model_config:
    lr: 1.0e-6
    self_forced:
      distribution_matching_objective: sid
      sid_alpha: 1.0
      sid_normalizer_eps: 1.0e-3
      use_stop_motion: false
      estimator_warmup_epochs: 1

data:
  train_batch_size: 26
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
