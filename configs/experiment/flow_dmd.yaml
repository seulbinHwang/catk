# @package _global_
#
# Self-Forcing DMD (Distribution Matching Distillation) fine-tuning.
# OCSC_clean мқҳ self_forcing_dmd м•Ңкі лҰ¬мҰҳмқ„ нҳ„мһ¬ repo мқҳ лӘЁлҚё/closed-loop inference
# мң„м—җ мқҙмӢқн•ң recipe.  generator loss лҠ” OCSC `_run_flow_dmd_ft_step` мқҳ synthetic
# gradient мҷҖ bit-лҸҷм№ҳ (smart_flow._compute_self_forced_distribution_matching_loss).
#
# м•Ңкі лҰ¬мҰҳ (per training step):
#   1. Generator(main encoder) к°Җ closed-loop rollout мңјлЎң x_gen мғқм„ұ (grad ON).
#   2. Critic(generated_estimator=fake_score) FM loss on x_gen.detach() вҶ’ critic update.
#   3. DMD synthetic gradient (real=frozen target_teacher, fake=critic, both stop-grad):
#        pred_x0_{r,f} = ОІ_pathВ·x_t + Пғ_П„В·v_{r,f}
#        g = (1/ОІ)В·pred_x0_fake вҲ’ pred_x0_real,   g_n = g / |pred_x0_real|.mean
#        target = (x_gen вҲ’ g_n).detach(),  L_gen = 0.5В·MSE(x_gen, target) вҶ’ generator update.
#
# ОІ(dmd_beta)=1 : vanilla Self-Forcing DMD мһ¬нҳ„.
# ОІ<1 : fake н•ӯ Г—(1/ОІ) мҰқнҸӯ вҶ’ entropyвҶ‘, diversityвҶ‘ (CPDвҶ‘ кІҪн–Ҙ).
# ОІ>1 : sharpening вҶ’ realismвҶ‘, mode collapse risk.
#
# м „м ң: ckpt_path м—җлҠ” к°ҷмқҖ flow_window_steps лЎң pretrain лҗң Generator checkpoint.
#   fresh finetune  вҶ’ action=finetune (target_teacher/critic/EMA лҘј pretrained лЎң sync)
#   resume          вҶ’ action=fit (aux state ліҙмЎҙ)

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    # Self-Forcing paper lr (critic = generator lr; dmd_fake_lr_scale=1.0 м •н•©).
    # мҡҙмҳҒ мӢң 1e-7 к№Ңм§Җ лӮ®м¶° м•Ҳм •нҷ” к°ҖлҠҘ (OCSC v22).
    lr: 2.0e-6
    n_rollout_closed_val: 32
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    self_forced:
      enabled: true
      start_epoch: 0
      weight: 1.0
      # в”Җв”Җ DMD objective в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      distribution_matching_objective: dmd
      # entropy knob ОІ. 1.0=vanilla DMD, <1=diversityвҶ‘, >1=sharpening.
      dmd_beta: 1.0
      # Self-Forcing abs-mean normalizer (|pred_x0_real|) on/off.
      dmd_normalize: true
      # ОІ annealing (cold-start systematic bias л°©м§Җ) вҖ” 0/0 мқҙл©ҙ мғҒмҲҳ ОІ.
      dmd_beta_warmup_steps: 0
      dmd_beta_anneal_steps: 0
      # pure DMD: BC anchor FM term лҒ”.
      use_anchor_flow_matching_loss: false
      anchor_weight: 0.0
      # critic(fake_score) update: anchor л§ҲлӢӨ 1 FM step (Self-Forcing м •н•©).
      estimator_updates_per_step: 1
      # critic warmup лҒ” (OCSC dmd_warmup_fake_only_steps=0 м •н•©).
      estimator_warmup_epochs: 0
      # Training self-rollout м „мҡ©. Inference/validation stop-motion мқҖ decoder мӘҪ.
      use_stop_motion: false
      # fresh finetune мқҖ pretrained Generator лЎң target_teacher/critic/EMA sync.
      initialize_aux_from_generator_on_fit_start: true
      # в”Җв”Җ OCSC self_forcing_dmd м •н•© (вҳ… conditioning кіөмң ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # full_flow_decoder = generatorВ·critic лӘЁл‘җ agent_encoder.flow_decoder л§Ң н•ҷмҠө,
      # context/map мқёмҪ”лҚ”лҠ” freeze. teacher лҠ” м „мІҙ freeze.
      # вҶ’ gen/teacher/critic мқҳ мқёмҪ”лҚ”к°Җ н•ӯмғҒ frozen-identical вҶ’ anchor conditioning
      #   (anchor_hidden) мқҙ byte-identical вҶ’ OCSC мқҳ лӢЁмқј cond_d кіөмң мҷҖ н–үлҸҷм Ғ лҸҷм№ҳ.
      #   real/fake score лҠ” лҸҷмқј x_tВ·лҸҷмқј conditioning м—җм„ң flow_decoder к°ҖмӨ‘м№ҳл§Ң
      #   лӢӨлҘҙкІҢ нҸүк°ҖлҗЁ (OCSC ref vs fake_score мҷҖ bit-м •н•©).
      unfrozen_range: full_flow_decoder
      # Generator EMA (Self-Forcing н‘ңмӨҖ). 0.0 мқҙл©ҙ validation мқҙ online weight мӮ¬мҡ©.
      ema_weight: 0.99
      ema_start_step: 50
      gradient_clip_val: 10.0
      # мӢңлӮҳлҰ¬мҳӨлӢ№ closed-loop rollout мҲҳ G (variance reduction). VRAM ~Gл°°.
      n_rollouts: 1
      # лӢЁмқј anchor 0 (OCSC dmd_anchor_stride лҢҖмқ‘; rollout кёёмқҙ мһҗлҸҷ).
      n_anchors: 1
      anchor_stride: 1
      sampling:
        sample_steps: 16
        sample_method: euler
        noise_scale: 1.0
        random_terminal_step:
          enabled: true
          scope: global_batch
          policy: paper_uniform
          min_executed_steps: 16

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 8
  max_epochs: 16
  precision: bf16-mixed
  # Manual optimization вҶ’ Lightning auto grad clip кёҲм§Җ. clip мқҖ
  # model.model_config.self_forced.gradient_clip_val лЎң м Ғмҡ©.
  gradient_clip_val: null
  sync_batchnorm: false
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 8
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
  train_epoch_sample_fraction: 0.5
