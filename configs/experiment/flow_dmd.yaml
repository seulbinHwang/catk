# @package _global_
#
# Self-Forcing DMD (Distribution Matching Distillation) fine-tuning.
# OCSC_clean 의 self_forcing_dmd 알고리즘을 현재 repo 의 모델/closed-loop inference
# 위에 이식한 recipe.  generator loss 는 OCSC `_run_flow_dmd_ft_step` 의 synthetic
# gradient 와 bit-동치 (smart_flow._compute_self_forced_distribution_matching_loss).
#
# 알고리즘 (per training step):
#   1. Generator(main encoder) 가 closed-loop rollout 으로 x_gen 생성 (grad ON).
#   2. Critic(generated_estimator=fake_score) FM loss on x_gen.detach() → critic update.
#   3. DMD synthetic gradient (real=frozen target_teacher, fake=critic, both stop-grad):
#        pred_x0_{r,f} = β_path·x_t + σ_τ·v_{r,f}
#        g = (1/β)·pred_x0_fake − pred_x0_real,   g_n = g / |pred_x0_real|.mean
#        target = (x_gen − g_n).detach(),  L_gen = 0.5·MSE(x_gen, target) → generator update.
#
# β(dmd_beta)=1 : vanilla Self-Forcing DMD 재현.
# β<1 : fake 항 ×(1/β) 증폭 → entropy↑, diversity↑ (CPD↑ 경향).
# β>1 : sharpening → realism↑, mode collapse risk.
#
# 전제: ckpt_path 에는 같은 flow_window_steps 로 pretrain 된 Generator checkpoint.
#   fresh finetune  → action=finetune (target_teacher/critic/EMA 를 pretrained 로 sync)
#   resume          → action=fit (aux state 보존)

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    # generator lr (static; self_forced 경로는 scheduler 없이 상수 lr).
    lr: 1.0e-6
    lr_warmup_steps: 0
    lr_total_steps: -1
    n_rollout_closed_val: 32
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    self_forced:
      enabled: true
      start_epoch: 0
      weight: 1.0
      # ── DMD objective ───────────────────────────────────────────────
      distribution_matching_objective: dmd
      # entropy knob β. 1.0=vanilla DMD, <1=diversity↑, >1=sharpening.
      dmd_beta: 1.0
      # Self-Forcing abs-mean normalizer (|pred_x0_real|) on/off.
      dmd_normalize: true
      # β annealing (cold-start systematic bias 방지) — 0/0 이면 상수 β.
      dmd_beta_warmup_steps: 0
      dmd_beta_anneal_steps: 0
      # pure DMD: BC anchor FM term 끔.
      use_anchor_flow_matching_loss: false
      anchor_weight: 0.0
      # cadence fake:gen = 3:1 — critic(fake) anchor 마다 3 FM step, generator 는 batch당 1 step.
      estimator_updates_per_step: 3
      # critic(fake) lr (절대값; >0 이면 lr/updates 비례식 대신 그대로 사용).
      estimator_lr: 1.0e-5
      # fake-only warmup: 첫 200 step 은 critic 만 학습(generator no-op).
      estimator_warmup_steps: 200
      estimator_warmup_epochs: 0
      # Training self-rollout 전용. Inference/validation stop-motion 은 decoder 쪽.
      use_stop_motion: false
      # fresh finetune 은 pretrained Generator 로 target_teacher/critic/EMA sync.
      initialize_aux_from_generator_on_fit_start: true
      # ── 학습 scope (★ conditioning 공유) ──────────────────────────────
      # velocity_head_only = generator·critic 모두 flow_decoder.velocity_head(=flow head)만
      #   학습, 나머지(context/map 인코더, chunk/step) 전부 freeze. teacher 는 전체 freeze.
      # → gen/teacher/critic 인코더가 항상 frozen-identical → anchor conditioning 이
      #   byte-identical → OCSC 단일 cond_d 공유와 행동적 동치. real/fake 는 동일 x_t·
      #   conditioning 에서 head 가중치만 다르게 평가됨.
      unfrozen_range: velocity_head_only
      # Generator EMA (Self-Forcing 표준). 0.0 이면 validation 이 online weight 사용.
      ema_weight: 0.99
      ema_start_step: 50
      gradient_clip_val: 10.0
      # ★ 분산/밀도 knob = G (OCSC dmd_n_rollouts).  같은 GT-grounded base 에서 noise tape
      #   G개를 batch-replicate 로 동시에 굴려 DMD 신호 variance 를 1/G 로 줄임. VRAM ~G배.
      #   (구버전의 다중 time-anchor 는 self-rollout drift 버그라 제거 → 분산은 여기서 늘린다.)
      n_rollouts: 1
      # time-anchor: OCSC GT-grounded per-anchor(🅐).  j 번째 anchor = token anchor j*stride
      #   = GT coarse step (j*stride)+1 에서 출발하는 별도 rollout 1 window.
      # n_anchors=4, anchor_stride=4(2초 간격, coarse 4 step) → anchor 가 ~1·3·5·7초 GT 시점.
      #   제약: (n_anchors-1)*stride <= 15 (anchor grid 16).
      n_anchors: 4
      anchor_stride: 4
      sampling:
        sample_steps: 16
        sample_method: euler
        noise_scale: 1.0
        random_terminal_step:
          enabled: true
          scope: global_batch
          policy: paper_uniform
          min_executed_steps: 16

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  # validation 을 400 train step 마다 (epoch 단위 아님).
  check_val_every_n_epoch: null
  val_check_interval: 400
  max_epochs: 16
  precision: bf16-mixed
  # Manual optimization → Lightning auto grad clip 금지. clip 은
  # model.model_config.self_forced.gradient_clip_val 로 적용.
  gradient_clip_val: null
  sync_batchnorm: false
  num_sanity_val_steps: 0

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 16
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
  train_epoch_sample_fraction: 0.5
