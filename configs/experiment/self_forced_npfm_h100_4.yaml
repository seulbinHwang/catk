# @package _global_

# ============================================================================
# Self-Forced NPFM fine-tuning preset for 4x H100 80GB.
# Derived from `self_forced_npfm_h100_6.yaml` (the 6xH100 preset).
# ----------------------------------------------------------------------------
# Differences vs. the 6xH100 preset:
#   * `trainer.devices=4` is pinned so the preset encodes the H100x4 intent.
#   * The core self-forced LR/sampling/loss knobs match the 6xH100 preset:
#     generator lr 1e-6, generated-estimator optimizer lr 1e-6,
#     anchor FM off and random terminal denoising enabled.
#   * Bounded Clean-DMD guidance defaults are pinned here for the 4xH100
#     experiment: clean_dmd_normalizer_eps=0.05, clean_dmd_tau_low=0.02,
#     clean_dmd_tau_high=0.98.
#   * `max_epochs / check_val_every_n_epoch / limit_val_batches` unchanged,
#     so the training budget in "epochs over the dataset" matches the 6xH100
#     preset; wall-clock per epoch is ~1.5x longer with 4 ranks vs 6.
#
# Loads a 2s-horizon pretrained Generator checkpoint via `ckpt_path=...` from
# the CLI with `action=finetune`, so only model weights are loaded and
# optimizer/epoch state is not resumed. The model default
# `flow_window_steps=20` (2s) is kept; do not override it unless the ckpt was
# pretrained at a different horizon.
#
# Run with:
#   CUDA_VISIBLE_DEVICES=0,1,2,3 \
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#   torchrun --standalone --nproc_per_node=4 -m src.run \
#     experiment=self_forced_npfm_h100_4 \
#     action=finetune \
#     paths.cache_root="$CACHE_ROOT" \
#     task_name=<your-task> \
#     ckpt_path=<path-to-2s-pretrain.ckpt>
# ============================================================================

defaults:
  - override /model: smart_flow
  - override /trainer: ddp

action: finetune

model:
  model_config:
    lr: 1e-6
    n_rollout_closed_val: 32
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    self_forced:
      enabled: true
      start_epoch: 0
      weight: 1.0
      clean_dmd_normalizer_eps: 0.05
      clean_dmd_tau_low: 0.02
      clean_dmd_tau_high: 0.98
      anchor_weight: 0.1
      use_anchor_flow_matching_loss: false
      detach_block_transition: true
      estimator_updates_per_step: 5
      estimator_warmup_epochs: 0
      # Fresh finetune syncs F_rho/F_psi from the pretrained Generator.
      # Resume from a self-forced checkpoint preserves restored aux states.
      initialize_aux_from_generator_on_fit_start: true
      unfrozen_range: middle
      ema_weight: 0.99
      ema_start_step: 50
      sampling:
        sample_steps: 16
        sample_method: euler
        noise_scale: 1.0
        # policy=all이면 마지막 K denoising step에만 gradient를 남깁니다.
        backprop_last_k: 8
        random_terminal_step:
          enabled: true
          scope: global_batch
          # paper_uniform: 실행 denoising step K를 min_executed_steps..sample_steps 범위에서 균등 샘플링합니다.
          # all: 항상 sample_steps 전체를 실행하고 sampling.backprop_last_k step만 역전파합니다.
          policy: all
          min_executed_steps: 16

ckpt_path: null

trainer:
  devices: 4
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 2
  max_epochs: 12
  precision: bf16-mixed
  # Lightning rejects auto gradient clipping under manual optimization.
  # Manual clip is configured at model.model_config.self_forced.gradient_clip_val
  # (default 1.0 from configs/model/smart_flow.yaml). Override there if needed.
  gradient_clip_val: null
  sync_batchnorm: false
  strategy:
    # `target_teacher` (frozen copy of the generator's encoder) and the
    # auxiliary `generated_estimator` parameters are registered on the
    # LightningModule but receive no gradient in any single backward pass on
    # the generator (the estimator has its own backward). DDP's reducer
    # otherwise raises:
    #   "parameters that were not used in producing the loss returned by
    #    training_step ... enable find_unused_parameters=True".
    find_unused_parameters: true

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  # Conservative per-GPU batch for self-forced random terminal denoising.
  # Increase only after a fresh memory probe on the target H100 box.
  train_batch_size: 26
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
  train_epoch_sample_fraction: 0.25
