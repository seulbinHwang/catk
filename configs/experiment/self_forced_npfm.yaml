# @package _global_

# Self-Forced N-Second Path-Flow Matching fine-tuning.
# 전제: ckpt_path에는 같은 flow_window_steps로 pretrain된 Generator checkpoint를 넣는다.

defaults:
  - override /model: smart_flow

# Start self-forced fine-tuning from pretrained weights only.
# Use `action=fit` explicitly only when resuming a self-forced run checkpoint.
action: finetune

model:
  model_config:
    lr: 2e-4
    lr_warmup_steps: 2
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 16
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    self_forced:
      enabled: true
      start_epoch: 0
      weight: 1.0
      path_step_size: 0.05
      anchor_weight: 0.1
      generated_estimator_lr: 2e-4
      estimator_updates_per_step: 1
      # Fresh finetune syncs F_rho/F_psi from the pretrained Generator.
      # Resume from a self-forced checkpoint preserves restored aux states.
      initialize_aux_from_generator_on_fit_start: true
      freeze_map_encoder: true
      use_control_space_physics_regularization: false
      physics_weight: 0.005
      sampling:
        sample_steps: 32
        sample_method: euler
        noise_scale: 1.0
        random_terminal_step:
          enabled: true
          scope: global_batch
          # paper_uniform: 논문에 가장 충실하게 s를 1..sample_steps에서 바로 균등 샘플링합니다.
          # stability_warmup: 초반 warmup_epochs 동안 K>=warmup_min_executed_steps만 허용한 뒤 전체 균등으로 바꿉니다.
          policy: paper_uniform
          warmup_epochs: 1
          warmup_min_executed_steps: 16

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 8
  max_epochs: 16
  precision: bf16-mixed
  # Lightning rejects auto gradient clipping under manual optimization.
  # Manual clip is configured at model.model_config.self_forced.gradient_clip_val.
  gradient_clip_val: null
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 8
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
