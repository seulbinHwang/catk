# @package _global_

# Self-Forced N-Second Path-Flow Matching fine-tuning.
# 전제: ckpt_path에는 같은 flow_window_steps로 pretrain된 Generator checkpoint를 넣는다.

defaults:
  - override /model: smart_flow

# Start self-forced fine-tuning from pretrained weights only.
# Use `action=fit` explicitly only when resuming a self-forced run checkpoint.
action: finetune

model:
  model_config:
    lr: 2e-4
    n_rollout_closed_val: 32
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    self_forced:
      enabled: true
      start_epoch: 0
      weight: 1.0
      clean_dmd_normalizer_eps: 0.05
      anchor_weight: 0.1
      use_anchor_flow_matching_loss: false
      detach_block_transition: true
      # Training self-rollout 전용입니다. Inference/validation stop-motion은
      # model_config.decoder.use_stop_motion으로 별도 제어합니다.
      use_stop_motion: false
      estimator_updates_per_step: 5
      estimator_warmup_epochs: 0
      # Fresh finetune syncs F_rho/F_psi from the pretrained Generator.
      # Resume from a self-forced checkpoint preserves restored aux states.
      initialize_aux_from_generator_on_fit_start: true
      unfrozen_range: except_map_encoder
      ema_weight: 0.99
      ema_start_step: 50
      sampling:
        sample_steps: 16
        sample_method: euler
        noise_scale: 1.0
        backprop_last_k: 8
        random_terminal_step:
          enabled: true
          scope: global_batch
          # paper_uniform: 실행 denoising step K를 min_executed_steps..sample_steps 범위에서 균등 샘플링합니다.
          policy: paper_uniform
          min_executed_steps: 16

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 8
  max_epochs: 16
  precision: bf16-mixed
  # Lightning rejects auto gradient clipping under manual optimization.
  # Manual clip is configured at model.model_config.self_forced.gradient_clip_val.
  gradient_clip_val: null
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 8
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
  train_epoch_sample_fraction: 0.1
