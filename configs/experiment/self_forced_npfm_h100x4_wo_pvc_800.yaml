# @package _global_

# ============================================================================
# Self-Forced NPFM fine-tuning preset for one 4x H100 pod: wo-pvc-800.
#
# The matching launcher downloads the W&B artifact
# `jksg01019-naver-labs/SMART-FLOW/epoch-last-g3zr84tp:v64` to:
#   /workspace/flow_semi_continuous_pretrain_h100x4x2_bs26/v64/epoch_last.ckpt
#
# Main experiment points:
#   * Single-node DDP: trainer.num_nodes=1, trainer.devices=4
#   * H100 precision: bf16-mixed
#   * Generator lr: 5e-6
#   * trainer.max_epochs=4, trainer.check_val_every_n_epoch=2
#   * self_forced.distribution_matching_objective=dmd
#   * self_forced.detach_block_transition=false
#   * self_forced.estimator_warmup_epochs=1
#   * self_forced.sampling.backprop_last_k=8
#   * self_forced.use_anchor_flow_matching_loss=true
#   * self_forced.anchor_weight=0.02 by default; use the sweep launcher to try several weights.
#   * self_forced.use_stop_motion=false for the training self-rollout
#   * scorer_scene_num=640 for fit-time closed-loop RMM
#   * data.train_batch_size=22
# ============================================================================

defaults:
  - self_forced_npfm_h100_4
  - _self_

trainer:
  num_nodes: 1
  devices: 4
  precision: bf16-mixed
  max_epochs: 4
  check_val_every_n_epoch: 2

model:
  model_config:
    lr: 5.0e-6
    scorer_scene_num: 640
    self_forced:
      distribution_matching_objective: dmd
      detach_block_transition: false
      anchor_weight: 0.02
      use_anchor_flow_matching_loss: true
      use_stop_motion: false
      estimator_warmup_epochs: 1
      sampling:
        backprop_last_k: 8

data:
  train_batch_size: 22
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
