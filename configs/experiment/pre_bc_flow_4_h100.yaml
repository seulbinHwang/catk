# @package _global_

# ============================================================================
# Pretrain preset for 4x H100 80GB boxes.
# Derived from `pre_bc_flow.yaml` (the 6x H100 80GB default pretrain preset).
# ----------------------------------------------------------------------------
# Key differences vs. the 6x H100 preset:
#   * fewer devices (4 vs 6).
#   * `flow_window_steps=20` is pinned explicitly so the per-GPU memory
#     profile this preset was tuned against stays fixed regardless of any
#     future change to the `smart_flow` default.
#   * `train_batch_size=52` is the measured per-GPU ceiling on H100 80GB after
#     commit b12e653's `AttentionLayer` activation recomputation kicks in:
#     peak reserved ~90% at 2s horizon (flow_window_steps=20) with ~10%
#     head-room for worst-case scenes. bs=56 also survived 200 steps at 94%
#     peak but bs=60 OOMed at 96.8%, so 52 is the recommended default and 56
#     is a "push-throughput" CLI override.
#   * effective global batch becomes 52*4 = 208 (1.73x the 6xH100 preset's
#     120). The current `lr=2.667e-4` below was scaled for the previous
#     per-GPU bs=20 (global 80). If you want to preserve the linear-LR
#     scaling rule at the new global batch 208, override with
#     `model.model_config.lr=6.933e-4` (= 4e-4 * 208/120). We keep the old lr
#     as the default to avoid silently changing optimizer behaviour.
#   * max_epochs / check_val_every_n_epoch / limit_val_batches unchanged, so
#     the training budget in "epochs over the dataset" matches the 6xH100
#     preset; wall-clock per epoch at bs=52 is ~87 min on 4xH100.
#
# If you need to preserve the original global batch of 120 instead of running
# at 208, drop `data.train_batch_size=30` from the CLI (4*30=120 aligns with
# the 6xH100 preset). Note bs=30 sits at ~95% peak without activation
# recomputation, so the activation-recomputation path (b12e653) is required.
# ============================================================================

defaults:
  - override /model: smart_flow

model:
  model_config:
    # Tuned for the previous per-GPU bs=20 (effective global 80). At the new
    # default bs=52 (global 208) the linear-LR rule would suggest
    # lr = 4e-4 * 208/120 = 6.933e-4; override from the CLI if desired.
    lr: 4e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 32
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    decoder:
      flow_window_steps: 20

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 32
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  accumulate_grad_batches: 1

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  # Per-GPU train batch = 52, measured on 4x H100 80GB with
  # flow_window_steps=20 and the `AttentionLayer` activation recomputation
  # from commit b12e653 turned on (default). Benchmark on this hardware:
  #   bs=40  -> peak reserved 80.2%
  #   bs=48  -> peak reserved 85.3%
  #   bs=52  -> peak reserved 90.1%  (current default, ~10% head-room)
  #   bs=56  -> peak reserved 94.0%  (push-throughput CLI override)
  #   bs=60  -> OOM at 96.8%
  # Without activation recomputation (pre-b12e653) the ceiling drops to
  # roughly bs=28 (~82.7% peak).
  train_batch_size: 26
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 8
  prefetch_factor: 1
  train_use_eval_agent_selection: true
