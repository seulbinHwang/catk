# @package _global_

defaults:
  - override /model: smart_flow

action: road_finetune

road:
  enabled: true
  source_train_raw_dir: ${paths.cache_root}/training
  work_dir: /workspace/road_cache
  road_data_use_ratio: 0.1
  num_source_scenarios: 486995
  rollouts_per_scenario: 3
  candidates_per_agent: 64
  temperature: 0.8
  sample_steps: 16
  sample_method: euler
  rollout_steps: 80
  commit_steps: 5
  selection_horizon_steps: 20
  generation_batch_size: 1
  candidate_micro_batch_size: 4
  selected_variant_seed: ${seed}
  cleanup_used_cache: true
  overwrite_cache: false

model:
  model_config:
    lr: 5e-5
    lr_warmup_steps: 1
    lr_total_steps: 10
    lr_min_ratio: 1e-2
    scorer_scene_num: 1680
    n_rollout_closed_val: 32
    val_open_loop: false
    val_closed_loop: true
    self_forced:
      enabled: false
    draft:
      enabled: false
    finetune:
      enabled: true
      freeze_smart_map_decoder_only: true
      train_full_flow_decoder_only: false

trainer:
  max_epochs: 10
  reload_dataloaders_every_n_epochs: 1
  check_val_every_n_epoch: 1
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_last: true
    every_n_epochs: 1

data:
  # on_fit_start에서 epoch_000/selected로 자동 교체됩니다.
  # setup 단계에서는 원본 cache가 존재해야 하므로 먼저 원본 경로를 둡니다.
  train_raw_dir: ${road.source_train_raw_dir}
  train_epoch_sample_fraction: 1.0
  train_use_eval_agent_selection: true
