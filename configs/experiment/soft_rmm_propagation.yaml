# @package _global_

# Soft-RMM propagation diagnostic fine-tuning.
# OCSC와 같은 closed-loop rollout 생성 경로를 쓰되, OL nearest-match L2 대신
# differentiable fast-RMM proxy를 loss로 backprop한다.
#
# 기본 horizon:
#   soft_rmm_loss_window_steps=15
#   = 10Hz 15 step
#   = decoder shift=5 기준 3 coarse frames
#   = 1.5초
#
# 사용 예:
#   CUDA_VISIBLE_DEVICES=3 NPROC_PER_NODE=1 \
#     MAX_EPOCHS=1 LIMIT_TRAIN_BATCHES=2 LIMIT_VAL_BATCHES=2 \
#     MY_EXPERIMENT=soft_rmm_propagation \
#     bash scripts/train_ocsc_ft.sh

defaults:
  - override /model: smart_flow
  - override /trainer: ddp

action: finetune
ckpt_path: null

model:
  model_config:
    lr: 5.0e-7
    weight_decay: 1.0e-4
    lr_warmup_steps: 0
    lr_min_ratio: 1.0
    n_rollout_closed_val: 16
    n_batch_sim_agents_metric: 100000
    sim_agents_metric_workers: 8
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    self_forced:
      enabled: false
    finetune:
      enabled: true
      mode: soft_rmm_propagation
      train_except_map_encoder: false
      train_full_flow_decoder_only: false
      velocity_head_only: true
      soft_rmm_n_rollouts: 4
      soft_rmm_loss_window_steps: 15
      soft_rmm_min_horizon_steps: 15
      soft_rmm_fields:
        - linear_speed
        - linear_acceleration
        - angular_speed
        - angular_acceleration
      soft_rmm_renormalize_weights: true
      soft_rmm_histogram_temperature: 1.0
      soft_rmm_indicator_temperature: 0.25
      soft_rmm_loss_weight: 1.0

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  val_check_interval: 200
  check_val_every_n_epoch: null
  max_epochs: 16
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_last: true
    save_top_k: 1

data:
  train_batch_size: 4
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
  train_epoch_sample_fraction: 0.5
