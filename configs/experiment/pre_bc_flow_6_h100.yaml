# @package _global_

# ============================================================================
# Pretrain preset for 6x H100 80GB with `flow_window_steps=80` (8s horizon).
# Derived from `pre_bc_flow.yaml` with two targeted changes:
#   * `model.model_config.decoder.flow_window_steps=80` (vs. 20 = 2s).
#   * `data.train_batch_size=18` (vs. 20 = 2s default).
#
# bs=18 is the measured per-GPU ceiling at flow_window_steps=80 on 6x H100 80GB
# after commit b12e653 enabled AttentionLayer activation checkpointing. The
# longer flow horizon combined with semi-continuous anchor selection keeps more
# dense per-batch targets than the 2s default, so bs cannot be pushed as high.
# bs=19 OOMed at step 121 (rank 2) and bs=20 OOMed at step 430 (rank 0) in
# 500-step probes.
# ============================================================================

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 4e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 16
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    decoder:
      flow_window_steps: 30

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 32
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 20
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
