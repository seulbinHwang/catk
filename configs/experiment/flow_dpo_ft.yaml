# @package _global_
# Flow-DPO fine-tuning: pairwise DPO with GT (winner) vs policy rollout (loser).
#
# 학습 루프:
#   1. encoder (no_grad) → anchor_hidden
#   2. y_w = GT clean trajectory  (winner — expert)
#   3. y_l = policy ODE rollout   (loser  — current model, same initial state)
#   4. FM log-prob proxy:
#        log π(y|s) ≈ -E_{t,x0}[ ||v_θ(x_t,t,s) - (y-x0)||² ]
#   5. DPO loss:
#        L = -log σ( β · [ (log π_θ(y_w) - log π_ref(y_w))
#                          - (log π_θ(y_l) - log π_ref(y_l)) ] )
#   6. Iterative: Lightning training loop updates model → next step uses updated model
#      for y_l generation (online DPO).
#
# Key metrics to watch:
#   train/dpo_pref_acc   → should rise above 0.5 (model prefers GT over rollout)
#   train/dpo_margin     → should increase (growing gap between y_w and y_l log probs)
#   train/dpo_log_p_w    → should increase (model assigns higher log p to GT)
#   train/dpo_log_p_l    → should decrease (model assigns lower log p to policy rollout)
#   val_kinematic/kin_ADE2s         → trajectory quality
#   val_closed/sim_agents/RMM       → main eval metric

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 5e-5
    lr_warmup_steps: 200
    lr_total_steps: -1
    lr_min_ratio: 1e-2
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 16
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    val_open_loop: true
    val_closed_loop: true
    kinematic_projection:
      enabled: true
    finetune:
      enabled: true
      mode: flow_dpo_ft
      rollout_steps: 4
      rollout_noise_scale: 1.0
      # ── DPO ───────────────────────────────────────────────────────────────
      dpo_beta: 0.1              # temperature β (lower → more conservative)
      dpo_n_samples: 8           # MC samples for FM log-prob (↑ = more accurate, slower)
      dpo_use_ref_model: true    # frozen pretrained as reference (prevents collapse)
      dpo_bc_lambda: 0.0         # >0 → add GT flow-matching BC loss

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  check_val_every_n_epoch: null
  val_check_interval: 500
  max_epochs: 10
  log_every_n_steps: 5
  precision: 32-true
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_kinematic/kin_ADE2s
    mode: min
    save_top_k: -1

data:
  train_batch_size: 8
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 1
