# @package _global_

# Control-space Flow Matching pretrain preset for one 4x H100 80GB pod.
#
# This intentionally inherits the full 4x H100 pretrain recipe and changes only
# the Flow Matching target space. With the flag below:
#   * token processor builds GT labels on the fly as [delta_s, delta_n, delta_yaw].
#   * decoder flow state dimension switches from pose-space 4D to control-space 3D.
#   * metric/rollout paths restore predictions back to pose-space internally.
#   * training masks GT anchors whose control round-trip position error is too large.

defaults:
  - pre_bc_flow_4_h100
  - _self_

model:
  model_config:
    token_processor:
      use_kinematic_control_flow: true
      control_pos_scale_m: 1.0
      control_yaw_scale_rad: 0.2
      # control-space yaw normalization is agent type-aware when agent_type is available:
      # vehicle=0.025rad, pedestrian=0.20rad, cyclist=0.06rad.
      # This scalar remains a fallback for calls without agent_type.
      control_round_trip_max_position_error_m: 5.0
