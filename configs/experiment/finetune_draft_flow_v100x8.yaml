# @package _global_

# ============================================================================
# DRaFT fine-tuning preset for 8x V100-SXM2 32GB (sm_70, Volta) boxes.
# Derived from `finetune_draft_flow_a100x4.yaml` (4x A100 80GB) which itself
# derives from `finetune_draft_flow.yaml` (6x H100 80GB).
# ----------------------------------------------------------------------------
# Key differences vs. the A100x4 preset:
#
#   * Precision: `bf16-mixed` -> `16-mixed`.
#     V100 (sm_70, Volta) has FP16 tensor cores but NO native BF16. Lightning's
#     `bf16-mixed` on V100 either falls back to software BF16 (very slow) or
#     fails on some kernels. `16-mixed` uses FP16 with automatic loss scaling
#     and runs on the FP16 tensor cores at full speed.
#
#   * VRAM: 80 GiB -> 32 GiB per GPU (~2.5x less). Empirical multi-node
#     runs on two V100x8 pods (`testv`, `testvv`) are stable with
#     `train_batch_size=36` and `accumulate_grad_batches=1`, so that is now
#     the default. On one V100x8 pod the effective global batch is kept at
#     288 (= 36 * 8 * 1), matching the 6xH100 / A100x4 training regime and
#     preserving `lr=2e-4`. On N V100x8 pods the effective batch scales to
#     288 * N; keep `lr=2e-4` unless you intentionally re-tune it.
#     If a new V100 box OOMs, first use the adaptive batch sweep or step
#     `data.train_batch_size` down in this order:
#         36 -> 28 -> 20 -> 12
#
#   * Attention kernel: A100x4 ships a math-SDPA patch in
#     `src/smart/modules/flow_local_decoder.py` for the ChunkStepRefiner
#     self-attention because A100 flash / mem-efficient kernels trip
#     `CUDA error: invalid configuration argument` on pathological batches.
#     V100 has no flash-attention (requires sm_80+) and PyTorch SDPA
#     auto-falls-back to math / mem-efficient on sm_70. The A100-specific
#     patch is a no-op on V100, so no extra action is needed here.
#
#   * closed-loop val memory: `val_batch_size * n_rollout_closed_val` rollouts
#     are materialized per rank before metric scoring. A prior 2-node V100x8
#     run completed epoch 15 training, then stalled for ~1h in closed-loop
#     validation and lost a worker before the next NCCL collective. Keep the
#     train default aggressive, but make fit-time validation conservative:
#     `2 * 8 = 16` rollouts per rank instead of the old `4 * 16 = 64`.
#     The official 2025 sim_agents scorer is TensorFlow CPU-heavy, so score
#     only the first validation batch during scheduled fit-time validation.
#
#   * CPU-side: 8 DDP ranks * 4 workers = 32 dataloader procs easily
#     overwhelms page-locked memory / file-handle limits on shared boxes.
#     We default to `num_workers: 2` (= 16 procs total) and `prefetch_factor: 2`.
#     Bump back to 4 only if you verify the box has enough RAM headroom.
#
# Effective global batch size on this preset:
#   per_gpu_batch * num_gpus * accumulate_grad_batches = 36 * 8 * 1 = 288
#   (identical to the 6xH100 preset, so `lr=2e-4` carries over directly.)
# ============================================================================

defaults:
  - override /model: smart_flow

model:
  model_config:
    # Optimizer / scheduler --------------------------------------------------
    # Effective global batch here is 36 * 8 * 1 = 288 (identical to the
    # 6xH100 and A100x4 presets), so the same lr=2e-4 applies unchanged.
    lr: 2e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2

    # Commit bridge ---------------------------------------------------------
    # Keep stop-motion gating OFF during this fine-tune. The pretrained flow
    # checkpoint was trained without stop_motion logic; see the note in
    # `finetune_draft_flow_a100x4.yaml` for the full rationale.
    use_stop_motion: false

    # Validation ------------------------------------------------------------
    # Keep fit-time closed-loop validation light enough for V100 32GB boxes.
    # CUDA OOM is auto-chunked in smart_flow.py, but CPU-side scorer worker
    # OOM can kill a rank and surface later as an NCCL remote error.
    n_rollout_closed_val: 8
    # Keep the 2025 sim-agents metric on, but score only the first batch and
    # use one scorer process per rank to avoid CPU RAM spikes / long stalls.
    n_batch_sim_agents_metric: 1
    sim_agents_metric_workers: 1
    val_open_loop: true
    val_closed_loop: true

    finetune:
      enabled: true
      train_full_flow_decoder_only: true

    draft:
      enabled: true
      loss_enabled: true
      start_epoch: 0
      ramp_epochs: 32
      max_weight: 0.5
      sampling:
        sample_steps: 32
        sample_method: euler
        noise_scale: 1.0
        # V100x8 multi-node runs are stable at bs=36 / acc=1 with this value.
        # If a new box OOMs on scene-variance spikes, prefer the adaptive
        # train_batch_size sweep before changing sampling semantics.
        backprop_last_k: 12
      physics:
        force_fp32: true
        dt: 0.1
        pos_scale_m: 20.0
        speed_floor_mps: 0.5
        vehicle_v_max_mps: 35.0
        vehicle_a_max_mps2: 8.0
        vehicle_lat_accel_max_mps2: 4.2
        bicycle_v_max_mps: 22.0
        bicycle_a_max_mps2: 5.5
        bicycle_lat_accel_max_mps2: 4.4
        pedestrian_v_max_mps: 5.0
        pedestrian_a_max_mps2: 4.7
        vehicle_wheelbase_scale: 0.60
        bicycle_wheelbase_scale: 0.85
        vehicle_steer_max_rad: 0.55
        bicycle_steer_max_rad: 0.90
        vehicle_steer_rate_max_radps: 0.8
        bicycle_steer_rate_max_radps: 1.4
        pedestrian_heading_weight: 0.05
        pedestrian_heading_speed_threshold_mps: 0.5
        soft_limit_ratio: 0.8
        topk_violation_k: 20
        eps: 1.0e-6

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  # Keep scheduled validation short on V100 multi-node runs. The first batch
  # computes the official TensorFlow sim_agents metric; the remaining batches
  # keep a small closed-loop / open-loop smoke signal without the old hour-long
  # scorer stall.
  limit_val_batches: 4
  check_val_every_n_epoch: 16
  # Epoch count matches the H100 / A100x4 presets (user policy: do not reduce).
  max_epochs: 32
  # V100 (sm_70) has no native BF16. Use FP16 with Lightning's automatic
  # loss scaler. If you ever see GradScaler "no-op" spam or NaN loss from
  # FP16 underflow, try `precision: 32-true` at ~2x VRAM / ~2x wall time.
  precision: 16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  # bs=36 per GPU * 8 GPUs * acc=1 = 288 effective batch, matching the
  # 6xH100 and A100x4 presets. lr=2e-4 carries over directly.
  accumulate_grad_batches: 1

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  # Per-GPU train batch. Empirically stable on the testv/testvv V100x8
  # multi-node run with `accumulate_grad_batches=1`.
  train_batch_size: 36
  # Per-GPU validation batch. Closed-loop rollout memory scales with
  # val_batch_size * n_rollout_closed_val (= 2 * 8 = 16 rollouts per rank).
  # This keeps scheduled validation from killing a worker on V100 32GB.
  val_batch_size: 2
  test_batch_size: 4
  # 8 DDP ranks * 2 workers = 16 loader procs. Bump to 4 only if the host
  # has enough RAM / file-handle headroom for 32 procs.
  num_workers: 2
  prefetch_factor: 2
  train_use_eval_agent_selection: true
