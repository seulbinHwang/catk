# @package _global_
defaults:
  - override /model: flow_smart

model:
  model_config:
    lr: 5e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    val_open_loop: true
    val_closed_loop: false
    closed_loop_steps: 0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 1
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 0.5
  accumulate_grad_batches: 1

data:
  train_batch_size: 12
  val_batch_size: 12
  test_batch_size: 12
  num_workers: 12

action: fit
