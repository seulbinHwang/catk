# @package _global_
defaults:
  - override /model: flow_smart

model:
  model_config:
    lr: 5e-4
    lr_warmup_steps: 0
    lr_min_ratio: 1e-2
    anchor_chunk_k: 3
    use_closed_loop_finetune: false
    finetune: false
    val_open_loop: true
    val_closed_loop: false

ckpt_path: null

logger:
  wandb:
    log_model: all
    project: SMART-FLOW

callbacks:
  model_checkpoint:
    monitor: val_open/loss
    mode: min
    save_last: true

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 1
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 0.5
  accumulate_grad_batches: 2

# H100 6장 기준 권장값
# effective batch = 8(per-device) * 6(gpu) * 2(accum) = 96
# flow head가 기존 NTP head보다 무거워서, 공식 SMART-tiny 설정(batch 10)보다 한 단계 보수적으로 둔다.
data:
  train_batch_size: 2
  val_batch_size: 2
  test_batch_size: 2
  num_workers: 2

action: fit
