# @package _global_
# Validation: Predict-Project-Renoise, 16 steps.

defaults:
  - override /model: smart_flow

model:
  model_config:
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    n_batch_sim_agents_metric: 1000
    val_open_loop: true
    val_closed_loop: true
    n_rollout_closed_val: 32
    eval_sampling_noise:
      noise_scale: 1.0
    kinematic_projection:
      enabled: true
      predict_project_renoise: true
      ppr_steps: 16
      eps: 1.0e-6
      use_lqr: true

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  precision: 32-true

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4
  prefetch_factor: 2

action: validate
