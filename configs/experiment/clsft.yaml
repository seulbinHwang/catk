# @package _global_

defaults:
  - override /model: smart

model:
  model_config:
    lr: 5e-5
    lr_min_ratio: 0.05
    use_closed_loop_finetune: true
    closed_loop_unroll: 4
    finetune: true
    val_open_loop: false

ckpt_path: BC_PRETRAINED_MODEL.ckpt

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  max_epochs: 8
  accumulate_grad_batches: 2

# H100 6장 기준 권장값
# effective batch = 4 * 6 * 2 = 48
# closed-loop FT는 메모리와 시간이 더 무거워서 batch를 한 단계 낮춘다.
data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 12

action: finetune
