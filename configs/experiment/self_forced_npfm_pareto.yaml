# @package _global_

# Pareto(RMM × CPD) fine-tuning preset.
# 기존 self_forced_npfm을 그대로 상속하면서, 이 작업의 baseline knob 만 명시합니다:
#   - generator distribution matching = DMD (entropy knob dmd_beta=1.0 = vanilla)
#   - open-loop FM regularizer (anchor FM loss) = OFF
#   - WOSAC CPD 정규화 scale은 smart_flow.yaml 기본 (training cache offline 값) 유지
#   - DPR(보존율) tracking을 위해 baseline CPD를 model_config.wosac_cpd_reference 에 넣을
#     수 있도록 슬롯만 남겨둠 (값은 sweep 시 override).
#
# 사용 예 (smoke; GPU 2 또는 3 사용):
#   CUDA_VISIBLE_DEVICES=3 conda run -n catk torchrun -m src.run \
#     experiment=self_forced_npfm_pareto action=finetune \
#     ckpt_path=<pretrain.ckpt> task_name=pareto_dmd_smoke \
#     trainer.devices=1 trainer.num_nodes=1 \
#     trainer.max_epochs=1 trainer.limit_train_batches=2 trainer.limit_val_batches=2
#
# Sweep 시 자주 바꾸는 knob:
#   - model.model_config.self_forced.dmd_beta ∈ {0.5, 0.75, 1.0, 1.25, 1.5}
#   - model.model_config.self_forced.distribution_matching_objective ∈ {dmd, sid}
#   - model.model_config.self_forced.sampling.noise_scale ∈ {1.0, 1.2, 1.5}
#   - model.model_config.self_forced.sampling.random_terminal_step.policy ∈ {paper_uniform, all}

defaults:
  - self_forced_npfm
  - _self_

model:
  model_config:
    # Self-Forcing 학습에서는 configure_optimizers 가 LR scheduler 를 만들지 않고
    # generator/critic AdamW 가 self.lr 을 고정으로 사용합니다 (smart_flow.py:3178+).
    # 잘 되는 세팅 빠른 탐색용 고정 1e-6.  critic LR = lr / estimator_updates_per_step.
    lr: 1.0e-6
    lr_warmup_steps: 0
    lr_min_ratio: 1.0
    self_forced:
      distribution_matching_objective: dmd
      use_anchor_flow_matching_loss: false
      # vanilla DMD로 시작 (β annealing은 본 plan 범위 밖).
      dmd_beta: 1.0
      # step 단위 estimator warmup (fake/critic only 학습 구간).
      # epoch 단위 estimator_warmup_epochs 와 OR 로 결합되며, 둘 다 0 이면 warmup 없이
      # 바로 generator+critic 동시 학습. 잘 되는 세팅 빠른 탐색용 default 200 step.
      estimator_warmup_steps: 200
      # step warmup 만 단독으로 쓰려면 epoch warmup 은 0 으로.
      estimator_warmup_epochs: 0
      # critic(generated estimator) LR 절대값 override.  양수로 명시되면 그 값을 그대로 사용
      # (default 1e-6 = generator LR 과 동일).  null 또는 0 이면 기존 비례식
      #   estimator_lr = lr / estimator_updates_per_step
      # 으로 fallback (Self-Forcing dfake_gen_update_ratio 관습).
      estimator_lr: 1.0e-6
      # Generator EMA off (잘 되는 세팅 빠른 탐색용).
      # ema_weight 는 학습 loss / gradient 에 영향 없고 오직 validation rollout 시
      # _get_eval_generator 가 EMA module 을 쓰는지 여부만 결정합니다 (smart_flow.py L1749).
      # sweep 단계에선 validation 이 online weight 결과를 직접 보여주도록 둘 다 꺼 두고,
      # 나중에 best 세팅으로 재학습할 때 ema_weight: 0.99 / ema_start_step: 50 로 복원.
      ema_weight: 0.0
      ema_start_step: 1000000000
      # smart_flow.py는 아래 키들도 read 하지만 base smart_flow.yaml에는 정의되어 있지
      # 않습니다. struct mode에서 CLI override가 막히지 않도록 default를 여기서 명시
      # (값은 smart_flow.py 기본값과 동일 → behavior-preserving).
      clean_dmd_normalizer_eps: 1.0e-3
      clean_dmd_tau_low: 0.02
      clean_dmd_tau_high: 0.98
      sampling:
        # policy=all 일 때만 의미. 마지막 K step에만 gradient 흐르도록 제한.
        backprop_last_k: 8
    # Pareto 추적용: pretrained baseline CPD 값을 넣으면 DPR(보존율)이 자동 로그됩니다.
    wosac_cpd_reference: null

trainer:
  # base trainer/default.yaml 에는 val_check_interval 키가 주석처리되어 있어 struct mode
  # 에서 override 가 막힙니다. 잘 되는 세팅 빠르게 탐색하려면 step 단위 평가가 편하므로
  # 본 분기에서만 null default 를 명시해 둡니다 (launcher 에서 VAL_CHECK_INTERVAL 로 override).
  val_check_interval: null
