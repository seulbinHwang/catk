# @package _global_

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 1e-4
    lr_warmup_steps: 1000
    lr_total_steps: -1
    lr_min_ratio: 1e-2
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 16
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    finetune:
      enabled: true
      mode: adjoint_matching
      rollout_steps: 16
      rollout_noise_scale: 1.0
      feasible_weight: 1.0
      smooth_deadzone_epsilon: [0.01, 0.01, 0.01]
      smooth_deadzone_tau: 0.002

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 1
  max_epochs: 8
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 26
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
