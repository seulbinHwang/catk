# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 4e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 32
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 32
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  use_distributed_sampler: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 26
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
  train_memory_balanced_batches: true
  train_memory_balance_metadata_cache: ${paths.log_dir}/dataset_metadata/womd_training_memory_balance_v1.pt
  train_memory_balance_metadata_num_workers: 8
  train_memory_balance_build_on_missing: true
