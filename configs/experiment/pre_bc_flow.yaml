# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 4e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 8
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 8
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 28
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 6
  prefetch_factor: 1
