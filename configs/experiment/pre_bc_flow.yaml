# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 5e-4
    lr_warmup_steps: 2
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 8

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 1
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 5.0

data:
  train_batch_size: 12
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 10
