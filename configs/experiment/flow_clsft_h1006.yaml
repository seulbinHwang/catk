# @package _global_
defaults:
  - override /model: flow_smart

model:
  model_config:
    lr: 5e-5
    lr_min_ratio: 0.05
    val_open_loop: false
    val_closed_loop: true
    closed_loop_steps: 4
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0

ckpt_path: FLOW_PRETRAINED_MODEL.ckpt

logger:
  wandb:
    log_model: all

callbacks:
  model_checkpoint:
    monitor: val_closed/ADE
    mode: min
    save_last: true

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  max_epochs: 16
  precision: bf16-mixed
  gradient_clip_val: 0.5
  accumulate_grad_batches: 2

data:
  train_batch_size: 6
  val_batch_size: 6
  test_batch_size: 6
  num_workers: 12

action: finetune
