# @package _global_
# Flow-RWR fine-tuning: Reward-Weighted Regression with GPU RMM.
#
# Algorithm:
#   1. encoder (no_grad) → anchor_hidden (all 13 anchors)
#   2. Generate G closed-loop rollouts from the same initial state
#   3. Score each rollout with GPU RMM → R^g  (no TFRecords needed)
#   4. Weights:  w^g = softmax(R^g / β)  per scenario
#   5. FM loss:  L = -Σ_k γ^k · Σ_g w^g · log π_θ(y^g_k | s_k)
#      where log π_θ ≈ -E_{t,x₀}[ ||v_θ - (y-x₀)||² ]
#
# Key differences from EPG:
#   - No IS weighting (rho), no KL divergence, no reference model
#   - GPU RMM (no TFRecords) → works on the full 487k training split
#   - Temporal discount γ^k down-weights later anchors (closed-loop error)
#
# Key metrics to watch:
#   train/rmm_mean        → mean GPU RMM of rollouts (should increase)
#   train/rmm_margin      → max−min RMM spread (higher = better learning signal)
#   train/rwr_pref_acc    → fraction where argmax(log_p) == argmax(weight)
#   train/rwr_log_p       → FM log-prob of rollouts (should increase for high-R)
#   train/rwr_weight_entropy → entropy of softmax weights (monitor collapse)
#   val_kinematic/kin_ADE2s  → trajectory quality
#   val_closed/sim_agents/RMM → main eval metric (official CPU RMM)

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 5e-5
    lr_warmup_steps: 200
    lr_total_steps: -1
    lr_min_ratio: 1e-2
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 16
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    val_open_loop: true
    val_closed_loop: true
    kinematic_projection:
      enabled: true
    finetune:
      enabled: true
      mode: flow_rwr_ft
      rollout_steps: 4
      rollout_noise_scale: 1.0
      # ── RWR ───────────────────────────────────────────────────────────────
      rwr_n_rollouts: 4          # G: rollouts per scenario (≥4 for good reward signal)
      rwr_beta: 0.1              # temperature β (lower → sharper weighting)
      rwr_n_samples: 8           # MC samples for FM ELBO log-prob
      rwr_anchor_discount: 0.9   # γ: 1.0=uniform, <1=discount later anchors
      rwr_head_only: false       # true → only residual_velocity_head trained

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  check_val_every_n_epoch: null
  val_check_interval: 500
  max_epochs: 10
  log_every_n_steps: 5
  precision: 32-true
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_kinematic/kin_ADE2s
    mode: min
    save_top_k: -1

data:
  train_batch_size: 8
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 1
  # RWR: uses training split — GPU RMM does not require TFRecords
  train_raw_dir: ${paths.cache_root}/training
  train_tfrecords_splitted: null    # not needed; GPU RMM handles scoring
  train_use_val_transform: true     # include all tracks_to_predict agents
