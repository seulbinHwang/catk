# @package _global_

# ============================================================================
# Flow Matching pretrain preset for two H100x4 nodes.
# ----------------------------------------------------------------------------
# Intended launch shape:
#   * 2 nodes
#   * 4 H100 80GB GPUs per node
#   * 8 total DDP ranks
#
# The per-GPU batch keeps the existing 6xH100 pretrain workload per GPU while
# using two extra GPUs for throughput:
#   train_batch_size 20 * 8 GPUs = effective global batch 160.
# The lr follows the README's linear scaling rule from the 6xH100 global batch
# 120 baseline: 4e-4 * 160 / 120 = 5.333e-4.
# ============================================================================

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 5.333e-4
    lr_warmup_steps: 4
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 16
    sim_agents_context_cache_size: 64
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    decoder:
      flow_window_steps: 20

ckpt_path: null

trainer:
  devices: 4
  num_nodes: 2
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 16
  max_epochs: 64
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false
  accumulate_grad_batches: 1

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 20
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: true
