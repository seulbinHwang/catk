# @package _global_
# Open-Closed Self-Consistency (OCSC) 파인튜닝 experiment.
#
# 알고리즘 요약:
#   1. 각 anchor (anchor_stride 간격) 에서:
#      - Open-loop sample 또는 GT 궤적을 target 으로 삼는다 (ocsc_gt_target).
#      - G 개의 closed-loop rollout 을 gradient 유지 상태로 실행한다.
#      - 4-channel anchor-local normalized space 에서 consistency loss 계산.
#   2. ``finetune.enabled=true`` + ``finetune.mode=ocsc_ft`` 가 OCSC 진입점.
#
# 기본 freeze 정책 (set_model_for_finetuning):
#   - 모든 파라미터 freeze.
#   - flow_decoder.step_refiner, flow_decoder.velocity_head 만 학습.
#   - ``finetune.train_full_flow_decoder_only=true`` 로 전체 flow_decoder 학습 가능.

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 5e-6
    lr_warmup_steps: 0
    lr_total_steps: -1
    lr_min_ratio: 0.1
    weight_decay: 1e-4
    n_rollout_closed_val: 4
    n_batch_sim_agents_metric: 2
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    val_open_loop: true
    val_closed_loop: true
    finetune:
      enabled: true
      # OCSC fine-tuning 모드.  smart_flow.py 의 ``_is_ocsc_ft_enabled()`` 가
      # 이 값을 검사해 ``_training_step_ocsc_ft`` 로 라우팅한다.
      mode: ocsc_ft
      # 기본 freeze: step_refiner + velocity_head 만 학습.  전체 flow_decoder
      # 를 학습하려면 train_full_flow_decoder_only=true 로 토글.
      train_full_flow_decoder_only: false

      # ── OCSC 핵심 파라미터 ─────────────────────────────────────────────
      # 시나리오당 closed-loop rollout 수 (>=2 면 MMD 사용 가능).
      ocsc_n_rollouts: 2
      # 매 N번째 2Hz step 만 anchor 로 사용.  stride=1 이면 가능한 모든 위치.
      ocsc_anchor_stride: 4
      # closed-loop rollout 의 coarse step 수 (×0.5s).  너무 길면 메모리/속도 부담.
      ocsc_pred_max_steps: 4
      # consistency loss 종류.
      ocsc_loss_type: l2
      # true: proper MMD² (open-loop 모드 한정, mode collapse 방지).
      # false: paired L2 mean (ablation 용).
      ocsc_use_mmd: true
      # true: open-loop sample 대신 GT 궤적을 consistency target 으로 사용.
      ocsc_gt_target: false
      # 손실 가중치들.
      ocsc_position_weight: 1.0
      ocsc_rel_disp_weight: 0.0
      ocsc_heading_weight: 0.0

      # ── HardRMM 모니터링 (선택) ───────────────────────────────────────
      # true 면 detached CL 궤적으로 매 N step 마다 RMM 계산해 wandb 로깅.
      # 데이터 dict 에 ``tfrecord_path`` 와 ``agent['id']`` 가 있어야 함.
      ocsc_eval_hard_rmm: false
      ocsc_eval_hard_rmm_interval: 10

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  check_val_every_n_epoch: null
  val_check_interval: 500
  max_epochs: 10
  log_every_n_steps: 1
  precision: 32-true
  gradient_clip_val: 0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_top_k: -1

data:
  train_batch_size: 16
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 1
  train_use_val_transform: true
