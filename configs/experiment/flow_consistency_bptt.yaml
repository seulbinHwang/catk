# @package _global_
# Open-Closed Self-Consistency (OCSC) fine-tuning experiment config.
# м•Ңкі лҰ¬мҰҳ:
#   1. Open-loop target (no_grad, rollout_idx=G): current/frozen policy лЎң 2мҙҲ к¶Өм Ғ мғқм„ұ.
#   2. Closed-loop predictions (grad, rollout_idx=0..G-1): G лІҲ closed-loop rollout.
#   3. Consistency loss = L2(closed_xy, target_xy) вҖ” covariate shift лҘј self-supervised л°©мӢқмңјлЎң к°җмҶҢ.
#   4. HardRMM monitoring: н•ҷмҠө rollout мқ„ detach н•ҙ л§Ө step (or N step л§ҲлӢӨ) hard RMM кі„мӮ°.

defaults:
  - override /model: smart_flow

action: finetune

model:
  model_config:
    lr: 5e-6
    lr_warmup_steps: 0
    lr_total_steps: -1
    lr_min_ratio: 0.1
    weight_decay: 1e-4
    lr_scheduler_unit: step
    n_rollout_closed_val: 4
    n_batch_sim_agents_metric: 2
    # hard: PyTorch мқё-н”„лЎңм„ёмҠӨ RMM (л№ лҰ„, к°’мқҖ real кіј лҸҷл“ұ)
    validation_metric: hard
    wosac_torch_compile: true
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    val_open_loop: true
    val_closed_loop: true
    decoder:
      flow_solver_steps: 4
    kinematic_projection:
      enabled: false
    finetune:
      enabled: true
      mode: ocsc_ft
      # в”Җв”Җ OCSC н•өмӢ¬ нҢҢлқјлҜён„° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # G: мӢңлӮҳлҰ¬мҳӨлӢ№ closed-loop rollout мҲҳ (bptt_n_rollouts мҷҖ лҸҷмқј к°ңл…җ)
      ocsc_n_rollouts: 2
      # anchor stride: л§Ө NлІҲм§ё 2Hz stepл§Ң anchorлЎң мӮ¬мҡ©
      # stride=4 вҶ’ [0,4,8,12] 4к°ң, stride=1 вҶ’ м „мІҙ 14к°ң
      ocsc_anchor_stride: 4
      # мқјкҙҖм„ұ loss: "l2" (MSE), "smooth_l1", "l1"
      ocsc_loss_type: l2
      # true (к¶ҢмһҘ): proper MMDВІ with self-terms (mode collapse л°©м§Җ)
      # false: кё°мЎҙ paired L2 mean (ablation л№„көҗмҡ©)
      ocsc_use_mmd: true
      # False: current policy лЎң open-loop target мғқм„ұ (н•ҷмҠө мӨ‘ target лҸ„ ліҖн•Ё)
      # True: frozen pretrained policy лЎң open-loop target мғқм„ұ
      ocsc_use_pretrained_ref: false
      # open-loop target rollout coarse step мҲҳ (4 Г— 0.5s = 2мҙҲ)
      ocsc_target_max_steps: 4
      # closed-loop prediction rollout coarse step мҲҳ (4 Г— 0.5s = 2мҙҲ)
      ocsc_pred_max_steps: 4
      # heading мқјкҙҖм„ұ loss к°ҖмӨ‘м№ҳ (0 = position only)
      ocsc_heading_weight: 0.0
      # HardRMM лӘЁлӢҲн„°л§Ғ (л§Ө training step): CONFIGURABLE
      ocsc_eval_hard_rmm: true
      ocsc_eval_hard_rmm_interval: 1
      # в”Җв”Җ BPTT tricks (rmm_bptt_ft мҷҖ лҸҷмқј м„Өм •) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      flow_velocity_head_only: true
      bptt_use_adjoint: false
      bptt_grad_clip_traj: 1.0
      bptt_sequential_rollouts: false
      bptt_warm_coarse_steps: 0
      bptt_last_n_coarse_steps: 0
      bptt_last_n_solver_steps: 0
      # GT flow-matching м •к·ңнҷ” (optional): 0 мқҙл©ҙ л№„нҷңм„ұ
      flow_reg_lambda: 0.0
      rollout_noise_scale: 1.0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.01
  check_val_every_n_epoch: null
  val_check_interval: 500
  max_epochs: 10
  log_every_n_steps: 1
  precision: 32-true
  gradient_clip_val: 0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max
    save_top_k: -1

data:
  train_batch_size: 16
  val_batch_size: 4
  num_workers: 4
  prefetch_factor: 1
  # ocsc_ft лҠ” tfrecord к°Җ н•„мҡ”н•©лӢҲлӢӨ (hard RMM monitoring мҡ©).
  # м—Ҷмңјл©ҙ ocsc_eval_hard_rmm=false лЎң лҒ„л©ҙ лҗ©лӢҲлӢӨ.
  train_raw_dir: ${paths.cache_root}/validation
  train_tfrecords_splitted: ${paths.cache_root}/validation_tfrecords_splitted
  train_use_val_transform: true
