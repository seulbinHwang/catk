# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 2e-4
    lr_warmup_steps: 2
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 16
    val_open_loop: true
    val_closed_loop: true
    finetune:
      enabled: true
      train_full_flow_decoder_only: true
    decoder:
      use_lqr: true
      use_stop_motion: false
      lqr_commit:
        clip_longitudinal_command: false
        clip_lateral_projection_and_final_curvature_state: false
    draft:
      enabled: true
      penalty_type: physics # physics | lqr
      start_epoch: 0
      ramp_epochs: 32
      max_weight: 0.35 # 0.05 가 1:1 비율임.
      gt_excess_only: false
      sampling:
        sample_steps: 16
        sample_method: midpoint
        noise_scale: 1.0
        backprop_last_k: 12
      lqr:
        force_fp32: true
      physics:
        force_fp32: true
        dt: 0.1
        pos_scale_m: 20.0
        deadzone_ratio: 0.02
        deadzone_softness: 0.02
        speed_weight: 1.0
        slip_weight: 2.0
        accel_weight: 1.0
        yaw_accel_weight: 1.0
        turn_weight: 0.5
        eps: 1.0e-6

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 16
  max_epochs: 32
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 48
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
  train_use_eval_agent_selection: false
