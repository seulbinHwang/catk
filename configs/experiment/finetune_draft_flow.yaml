# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    lr: 2e-4
    lr_warmup_steps: 2
    lr_min_ratio: 1e-2
    n_rollout_closed_val: 16
    val_open_loop: true
    val_closed_loop: true
    finetune: true
    draft:
      enabled: true
      start_epoch: 0
      ramp_epochs: 16
      max_weight: 0.05 # raw physics loss에 곱해지는 외부 ramp 계수입니다.
      loss_scale: 0.005
      gt_excess_only: false
      train_sampling:
        num_samples: 2
        seed_base: 0
      fm_guard:
        enabled: true
        cap_ratio: 0.1
        eps: 1.0e-12
      sampling:
        sample_steps: 16
        sample_method: midpoint
        noise_scale: 1.0
        backprop_last_k: 4
      physics:
        force_fp32: true
        dt: 0.1
        pos_scale_m: 20.0
        deadzone_ratio: 0.02
        deadzone_softness: 0.02
        speed_weight: 1.0
        slip_weight: 1.0
        accel_weight: 1.0
        yaw_accel_weight: 1.0
        turn_weight: 0.33
        eps: 1.0e-6

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.1
  check_val_every_n_epoch: 2
  max_epochs: 16
  precision: bf16-mixed
  gradient_clip_val: 1.0
  sync_batchnorm: false

callbacks:
  model_checkpoint:
    monitor: val_closed/sim_agents_2025/realism_meta_metric
    mode: max

data:
  train_batch_size: 20
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 4
  prefetch_factor: 1
