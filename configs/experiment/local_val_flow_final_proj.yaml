# @package _global_
# Validation: standard ODE generation followed by post-hoc projection to nearest feasible region.
# No per-step projection — baseline vs. ProjectedDiffusion comparison.

defaults:
  - override /model: smart_flow

model:
  model_config:
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    n_batch_sim_agents_metric: 50
    val_open_loop: true
    val_closed_loop: true
    n_rollout_closed_val: 16
    eval_sampling_noise:
      noise_scale: 1.0
    final_projection:
      enabled: true
      feasible_weight: 1.0
      smooth_deadzone_epsilon: [0.01, 0.01, 0.01]
      smooth_deadzone_tau: 0.002
      proj_lr: 0.01
      n_final_proj_steps: 100

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  precision: 32-true

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4
  prefetch_factor: 2

action: validate
