# @package _global_

# ============================================================================
# Self-Forced NPFM fine-tuning preset for 5 nodes x 3 V100 32GB.
#
# This preset is derived from `self_forced_npfm_h100_4.yaml` and keeps the
# self-forcing objective knobs aligned with that H100x4 experiment. The
# hardware-facing changes are:
#   * `trainer.num_nodes=5`, `trainer.devices=3` for 15 total ranks.
#   * `trainer.precision=16-mixed` because V100 does not support bf16.
#   * `data.train_batch_size=6`. The V100x4x4 self-forced run OOMed at bs=8
#     after epoch 0, so this preset starts from the same safer per-GPU batch.
#   * `data.val_batch_size=4`, so validation scorer scenes stay comparable:
#     4 x 15 ranks = 60 scenes per validation batch, close to H100x4
#     val_batch_size=16 x 4 ranks = 64.
#   * `model.model_config.scorer_scene_num=300`, giving 5 official scorer
#     batches at world_size=15 and val_batch_size=4.
#
# Main experiment points:
#   * unfrozen_range=except_map_encoder
#   * estimator_warmup_epochs=4
# ============================================================================

defaults:
  - self_forced_npfm_h100_4
  - _self_

trainer:
  num_nodes: 5
  devices: 3
  precision: 16-mixed

data:
  train_batch_size: 6
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4
  prefetch_factor: 1

model:
  model_config:
    scorer_scene_num: 300
    self_forced:
      unfrozen_range: except_map_encoder
      estimator_warmup_epochs: 4
