# @package _global_

defaults:
  - override /model: smart_flow

model:
  model_config:
    n_vis_batch: 0
    n_vis_scenario: 0
    n_vis_rollout: 0
    decoder:
      num_map_layers: 2
      flow_num_chunk_layers: 1
    n_batch_sim_agents_metric: 0
    val_open_loop: false
    val_closed_loop: true
    # Keep 32 submission rollouts, but size eval batches so 32-rollout export
    # stays near the max-safe closed-loop memory envelope observed in pre_bc_flow.
    n_rollout_closed_val: 32
    validation_rollout_sampling:
      sample_steps: 16
      sample_method: midpoint
      noise_scale: 1.0
    sim_agents_submission:
      is_active: true
      method_name: "Flow Agents 7M"
      authors: [Seulbin Hwang, Kiyoung Om]
      affiliation: NaverLabs
      description: Flow-based generative model for simulating realistic agents.
      method_link: "not available yet"
      account_name: "h.sb@naverlabs.com"

ckpt_path: YOUR_MODEL.ckpt

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  check_val_every_n_epoch: 1
  precision: bf16-mixed
  gradient_clip_val: 5.0

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 8
  num_workers: 4
  prefetch_factor: 1
  shuffle: false
  pin_memory: true
  persistent_workers: true
