# @package _global_
# Validation: PPR 16-step + Kinematic Bicycle Model projection.
# 매 ODE step: x_1 예측 → bicycle model projection (time-weighted) → re-noise
# Chunk 간 속도 상태(v_state) 유지로 물리적 연속성 보장.

defaults:
  - override /model: smart_flow

model:
  model_config:
    n_vis_batch: 1
    n_vis_scenario: 2
    n_vis_rollout: 4
    n_batch_sim_agents_metric: 50
    val_open_loop: true
    val_closed_loop: true
    n_rollout_closed_val: 16
    eval_sampling_noise:
      noise_scale: 1.0
    kinematic_projection:
      enabled: true
      predict_project_renoise: true
      ppr_steps: 16
      use_bicycle_model: true       # TV-LQR + Kinematic Bicycle Model
      wheelbase: 2.7                # 축간거리 (m)
      delta_max: 0.52               # 최대 조향각 (rad, ~30°)
      a_max: 4.0                    # 최대 가속도 (m/s²)
      d_max: 8.0                    # 최대 감속도 (m/s²)
      delta_rate_max: 0.6           # 최대 조향 속도 (rad/s)
      ped_a_max: 2.0                # 보행자 최대 가속/감속 (m/s²)
      eps: 1.0e-6
      # TV-LQR 가중치
      use_lqr: true
      lqr_q_xy: 2.0
      lqr_q_yaw: 2.0
      lqr_q_v: 0.5
      lqr_q_delta: 0.2
      lqr_r_a: 0.2
      lqr_r_delta_rate: 0.2
      lqr_qf_scale: 2.0

ckpt_path: null

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 50
  check_val_every_n_epoch: 1
  precision: 32-true

data:
  train_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  num_workers: 4
  prefetch_factor: 2

action: validate
