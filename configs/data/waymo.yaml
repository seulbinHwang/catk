_target_: src.smart.datamodules.MultiDataModule
train_batch_size: 4
val_batch_size: 4
test_batch_size: 4
num_workers: 4
shuffle: true
pin_memory: true
persistent_workers: true
train_raw_dir: ${paths.cache_root}/training
val_raw_dir: ${paths.cache_root}/validation
val_tfrecords_splitted: ${paths.cache_root}/validation_tfrecords_splitted
test_raw_dir: ${paths.cache_root}/testing
train_max_num: 32
train_use_eval_agent_selection: false
train_agent_token_sidecar_dir: null
train_agent_token_sidecar_required: false
road_num_rollouts_per_scenario: 1
train_memory_balanced_batching: true
train_memory_balance_metadata_path: null
train_memory_balance_metadata_num_workers: 0
train_memory_balance_weight_key: agent_quadratic
train_memory_balance_bucket_size_multiplier: 50
train_memory_balance_seed: ${seed}
