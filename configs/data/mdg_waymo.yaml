_target_: src.mdg.data.MDGDataModule
train_batch_size: 4
val_batch_size: 4
test_batch_size: 4
num_workers: 4
shuffle: true
pin_memory: true
persistent_workers: true
train_raw_dir: ${paths.cache_root}/training
val_raw_dir: ${paths.cache_root}/validation
val_tfrecords_splitted: ${paths.cache_root}/validation_tfrecords_splitted
test_raw_dir: ${paths.cache_root}/testing
train_max_agents: 64
max_map_polylines: 320
map_waypoints: 16
max_traffic_lights: 16
train_memory_balanced_batching: false
train_memory_balance_metadata_cache: null
train_memory_balance_metadata_num_workers: 8
train_memory_balance_build_on_missing: true
train_memory_balance_agent_weight: 1.0
train_memory_balance_current_valid_agent_weight: 1.0
train_memory_balance_valid_agent_step_weight: 0.0
train_memory_balance_map_weight: 0.02
train_memory_balance_seed: ${seed}
train_anchor_steps: [10, 20, 30, 40, 50, 60, 70, 80]
