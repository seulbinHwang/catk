_target_: src.smart.model.smart.SMART
model_config:
  lr: 0.0005
  lr_warmup_steps: 0
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.05

  n_rollout_closed_val: 32
  n_batch_wosac_metric: 10
  n_vis_batch: 2
  n_vis_scenario: 5
  n_vis_rollout: 5
  val_open_loop: true
  val_closed_loop: true

  flow_sampling:
    noise_scale: 1.0
    ode_steps: 4
  validation_flow_sampling:
    noise_scale: 1.0
    ode_steps: 4
  closed_loop_steps: 0

  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "agent_vocab_555_s2.pkl"
    map_token_sampling:
      num_k: 1
      temp: 1.0
    agent_token_sampling:
      num_k: 1
      temp: 1.0

  decoder:
    hidden_dim: 128
    num_freq_bands: 64
    num_heads: 8
    head_dim: 16
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
    future_window_steps: 20
    anchor_chunk_k: 4
    history_slots: 6

  wosac_submission:
    is_active: false
    method_name: "CATK-flow-tiny-7M"
    authors: [Anonymous]
    affiliation: YOUR_AFFILIATION
    description: YOUR_DESCRIPTION
    method_link: YOUR_METHOD_LINK
    account_name: YOUR_ACCOUNT_NAME

  training_loss:
    overlap_loss_weight: 0.1

  finetune: false
