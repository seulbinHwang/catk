_target_: src.smart.model.smart.SMART
model_config:
  lr: 0.0005
  lr_warmup_steps: 0
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.05
  n_rollout_closed_val: 32
  # Optional: set this to the SMART pretrain CPD value only when you want DPR.
  # CPD/CES are evaluated regardless of this value.
  wosac_cpd_reference: null
  # Fixed WOSAC-CPD/CES normalization scale from the training cache.
  # Order: vehicle, pedestrian, cyclist. Validation/test metrics use this
  # value first; if it is null, validation falls back to GT-derived scale.
  wosac_distribution_type_scale: [22.3461620418, 4.5793447978, 18.5374388830]
  n_batch_sim_agents_metric: 10
  # Positive values auto-set n_batch_sim_agents_metric from world_size and
  # val_batch_size so scorer work is comparable across GPU counts. Set null or
  # 0 to keep the explicit n_batch_sim_agents_metric value.
  scorer_scene_num: 1680
  # Fast checkpoint-only validation during fit. This limits fit-time validation
  # to the Fast WOSAC scorer batches only, so keep it false for full validation.
  fit_time_fast_validation_only: false
  n_vis_batch: 2
  n_vis_scenario: 5
  n_vis_rollout: 5
  delete_local_videos_after_wandb_upload: true
  val_open_loop: true
  val_closed_loop: true
  validation_closed_seed: 0
  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "trajtok_vocab.pkl"
  validation_rollout_sampling:
    criterium: topk_prob
    num_k: 5 # for k most likely
    temp: 1.0
  training_rollout_sampling:
    criterium: topk_prob # {topk_dist_sampled_with_prob, topk_prob, topk_prob_sampled_with_dist}
    num_k: -1 # for k nearest neighbors, set to -1 to turn-off closed-loop training
    temp: 1.0
  decoder:
    hidden_dim: 124
    num_freq_bands: 64
    num_heads: 8
    head_dim: 16
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
  sim_agents_submission:
    is_active: false
    method_name: "SMART-tiny-CLSFT"
    authors: [Anonymous]
    affiliation: YOUR_AFFILIATION
    description: YOUR_DESCRIPTION
    method_link: YOUR_METHOD_LINK
    account_name: YOUR_ACCOUNT_NAME
    # Waymo submission proto의 num_model_parameters 필드. 모델 크기에 맞춰 override.
    # 작은 모델로 학습한 경우 "3M" / "1M" 등으로 바꿔야 한다.
    num_model_parameters: "7M"
  training_loss:
    use_gt_raw: true
    gt_thresh_scale_length: -1.0  # {"veh": 4.8, "cyc": 2.0, "ped": 1.0}
    label_smoothing: 0.1
    spatial_aware_smoothing: true
    spatial_aware_smoothing_mode: paper  # {paper, thinklab, normalized}
    state_conditioned_target: true
    state_conditioned_target_chunk_size: 256
    rollout_as_gt: false
  finetune: false
