_target_: src.smart.model.smart_flow.SMARTFlow
model_config:
  lr: 0.0005
  weight_decay: 0.01
  lr_warmup_steps: 2
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.01
  n_rollout_closed_val: 32
  # Optional: set this to the flow-pretrain CPD value only when you want DPR.
  # CPD/CES are always evaluated regardless of this value.
  wosac_cpd_reference: null
  # Fixed WOSAC-CPD/CES normalization scale from the training cache.
  # Order: vehicle, pedestrian, cyclist. Validation/test metrics use this
  # value first; if it is null, validation falls back to GT-derived scale.
  wosac_distribution_type_scale: [22.3461620418, 4.5793447978, 18.5374388830]
  n_batch_sim_agents_metric: 10
  # Positive values auto-set n_batch_sim_agents_metric from world_size and
  # val_batch_size. The default 1728 is divisible by the global validation
  # batch sizes used by current 2/4/6/8/32-GPU scorer jobs, so RMM compares
  # the same scenario count across OCSC/pretrain/DMD runs. Set null or 0 to
  # keep the explicit n_batch_sim_agents_metric value.
  scorer_scene_num: 1728
  # Fast WOSAC scenario-level metric worker threads. Keep validation quality
  # unchanged while parallelizing independent scenario scoring on CPU.
  sim_agents_metric_workers: 8
  n_vis_batch: 0
  n_vis_scenario: 0
  n_vis_rollout: 0
  vis_ghost_gt: false
  vis_flow_preview: true
  delete_local_videos_after_wandb_upload: false
  val_open_loop: true
  val_closed_loop: true
  validation_open_seed: 0
  validation_closed_seed: 0
  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "agent_vocab_555_s2.pkl"
    flow_window_steps: ${model.model_config.decoder.flow_window_steps}
    # false: full-window лѓЄлЮШк∞А л™®лСР мЬ†нЪ®нХЬ anchorлІМ нХЩмКµнХ©лЛИлЛ§.
    # true: 18-token / 16-anchor pretrainмЧРмДЬ tail anchorмЭШ мЬ†нЪ® prefixлІМ lossл•Љ м§НлЛИлЛ§.
    use_prefix_valid_future_loss_mask: true
    # falseмЭіл©і кЄ∞м°і pose-space Flow MatchingмЭД кЈЄлМАл°Ь мВђмЪ©нХ©лЛИлЛ§.
    # trueмЭіл©і GT poseмЧРмДЬ control labelмЭД on-the-flyл°Ь лІМлУ§к≥†,
    # Flow MatchingмЭА [delta_s, delta_n, delta_yaw] м†ЬмЦік≥µк∞ДмЧРмДЬ нХЩмКµнХ©лЛИлЛ§.
    use_kinematic_control_flow: true
    # false: vehicle/cyclistлКФ non-holonomic, pedestrianмЭА holonomic.
    # true: vehicle/cyclistкєМмІА pedestrianк≥Љ к∞ЩмЭА holonomic modelмЭД м†БмЪ©нХ©лЛИлЛ§.
    use_holonomic_model_only: false
    # true: decoder-consistent rolling supervisionмЬЉл°Ь GT control labelмЭД лІМлУ≠лЛИлЛ§.
    # false: к∞Б stepмЭШ raw GT pose pairлІМмЬЉл°Ь inverse control labelмЭД лІМлУ≠лЛИлЛ§.
    # use_holonomic_model_only=trueмЭЉ лХМлКФ лСР л∞©мЛЭмЭі к∞ЩмЭА targetмЭД лІМлУ≠лЛИлЛ§.
    use_rolling_supervision: true
    control_pos_scale_m: 1.0
    # vehicle/cyclistмЭШ non-holonomic no-slip pointл•Љ box center лТ§м™љмЬЉл°Ь
    # box length * мЭі лєДмЬ®лІМнБЉ мШЃкєБлЛИлЛ§. к∞ТмЭА м†Дм≤і SMART cache training splitмЧРмДЬ мґФм†ХнЦИмКµлЛИлЛ§.
    control_vehicle_no_slip_point_ratio: 0.2289518863
    control_cyclist_no_slip_point_ratio: 0.0495847873
    # control-space yaw normalization is agent type-aware and config-managed.
    control_vehicle_yaw_scale_rad: 0.025
    control_pedestrian_yaw_scale_rad: 0.20
    control_cyclist_yaw_scale_rad: 0.06
    # control-space нХЩмКµмЧРмДЬ GT -> control -> pose л≥µмЫР мЬДмєШ мШ§м∞®к∞А мЭі к∞Тл≥ілЛ§ нБ∞ anchorлКФ нХЩмКµмЧРмДЬ м†ЬмЩЄнХ©лЛИлЛ§.
    control_round_trip_max_position_error_m: 0.5
  validation_rollout_sampling:
    sample_steps: 16
    sample_method: euler
    noise_scale: 1.0
  self_forced:
    enabled: false
    start_epoch: 0
    weight: 1.0
    path_step_size: 0.05
    anchor_weight: 0.05
    use_anchor_flow_matching_loss: false
    distribution_matching_objective: dmd
    sid_alpha: 1.0
    sid_normalizer_eps: 1.0e-3
    detach_block_transition: false
    # Stop-motion gateлКФ м†Д к≤љл°ЬмЧРмДЬ мВђмЪ©нХШмІА мХКмКµлЛИлЛ§. к∞ТмЭА falseл°Ь к≥†м†ХнХ©лЛИлЛ§.
    use_stop_motion: false
    estimator_updates_per_step: 5
    estimator_warmup_epochs: 1
    initialize_aux_from_generator_on_fit_start: true
    unfrozen_range: except_map_encoder
    ema_weight: 0.99
    ema_start_step: 50
    # Manual gradient clip used inside self-forced training_step / estimator
    # update. Lightning's `Trainer(gradient_clip_val=...)` cannot be used
    # because manual optimization is on; the model reads this value and
    # applies clip_gradients() itself.
    gradient_clip_val: 1.0
    sampling:
      sample_steps: 16
      sample_method: euler
      noise_scale: 1.0
      random_terminal_step:
        enabled: true
        scope: global_batch
        # paper_uniform: мЛ§нЦЙ denoising step Kл•Љ min_executed_steps..sample_steps л≤ФмЬДмЧРмДЬ кЈ†лУ± мГШнФМлІБнХ©лЛИлЛ§.
        policy: paper_uniform
        min_executed_steps: 16
  decoder:
    hidden_dim: 128
    num_freq_bands: 64
    num_heads: 8
    head_dim: 15
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
    flow_window_steps: 20
    flow_dim: 96
    flow_num_chunk_heads: 4
    flow_num_chunk_layers: 2
    flow_solver_steps: 32
    flow_solver_method: euler
    flow_solver_eps: 1.0e-3
    # Training-only metric memory control. It does not change loss/target/model
    # capacity and only detaches train metric clean reconstruction graphs.
    detach_train_metric_clean: false
    # мХДлЮШ control-space к≥µмЬ† мД§м†ХмЭА token_processor к∞ТмЭД лЛ®мЭЉ кЄ∞м§АмЬЉл°Ь мВђмЪ©нХ©лЛИлЛ§.
    # decoder м™љлІМ лЛ§л•Є к∞ТмЬЉл°Ь overrideнХШл©і SMARTFlow міИкЄ∞нЩФ лЛ®к≥ДмЧРмДЬ мЧРлЯђл•Љ лГЕлЛИлЛ§.
    use_kinematic_control_flow: ${model.model_config.token_processor.use_kinematic_control_flow}
    use_holonomic_model_only: ${model.model_config.token_processor.use_holonomic_model_only}
    use_rolling_supervision: ${model.model_config.token_processor.use_rolling_supervision}
    control_pos_scale_m: ${model.model_config.token_processor.control_pos_scale_m}
    control_vehicle_no_slip_point_ratio: ${model.model_config.token_processor.control_vehicle_no_slip_point_ratio}
    control_cyclist_no_slip_point_ratio: ${model.model_config.token_processor.control_cyclist_no_slip_point_ratio}
    control_vehicle_yaw_scale_rad: ${model.model_config.token_processor.control_vehicle_yaw_scale_rad}
    control_pedestrian_yaw_scale_rad: ${model.model_config.token_processor.control_pedestrian_yaw_scale_rad}
    control_cyclist_yaw_scale_rad: ${model.model_config.token_processor.control_cyclist_yaw_scale_rad}
    closed_loop_rollout_mode: raw_fm # raw_fm | matched_token_chunk
    use_lqr: false
    use_stop_motion: false
    lqr_commit:
      dt: 0.1
      history_steps: 6
      horizon_steps: 10
      velocity_smooth_lambda: 1.0e-4
      curvature_smooth_lambda: 1.0e-2
      curvature_init_reg: 1.0e-10
      stop_speed_mps: 0.2
      stop_speed_kp: 0.5
      longitudinal_q: 10.0
      longitudinal_r: 0.
      lateral_q_lat: 1.0
      lateral_q_head: 10.0
      lateral_q_kappa: 0.
      lateral_r: 0.
      accel_tau_s: 0.
      curvature_tau_s: 0.
      min_speed_for_curvature_clip_mps: 0.5
  sim_agents_submission:
    is_active: false
    method_name: "SMART-flow-7M"
    authors: [Seulbin Hwang, Kiyoung Om]
    affiliation: NaverLabs
    description: Flow-based generative model for simulating realistic agents.
    method_link: "not available yet"
    account_name: "h.sb@naverlabs.com"
  finetune:
    enabled: false
    train_except_map_encoder: false
    train_full_flow_decoder_only: false
    # вФАвФА OCSC (Open-Closed Self-Consistency) finetune mode вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
    # mode к∞А "ocsc_ft" лШРлКФ "soft_rmm_propagation" мЭік≥† enabled=true мЭіл©і
    # training_step мЭі self_forced лМАмЛ† closed-loop fine-tune step мЬЉл°Ь лґДкЄ∞
    # (self_forced framework мЩА к≤©л¶ђ).
    mode: none                          # none / ocsc_ft / soft_rmm_propagation
    # velocity_head_only=true л©і set_model_for_finetuning мЭШ step_refiner unfreeze мЭінЫД
    # __init__ мЧРмДЬ step_refiner л•Љ лЛ§мЛЬ freeze вЖТ velocity_head лІМ trainable (OCSC clean м†ХнХ©).
    velocity_head_only: false
    ocsc_n_rollouts: 4                  # G вАФ student closed-loop rollout мИШ
    ocsc_n_ol_rollouts: -1              # M вАФ open-loop sample мИШ.  -1 мЭіл©і G мЩА лПЩмЭЉ
    ocsc_ol_nearest_match: true         # к∞Б CL g мЧР лМАнХі M OL м§С argmin L2 лІ§мє≠
    ocsc_loss_type: l2                  # l2 (other types лѓЄмІАмЫР in this minimal port)
    ocsc_gt_target: false               # true вЖТ OL sample лМАмЛ† GT (single target, no nearest)
    ocsc_use_pretrained_ref: true       # OL мГЭмД±мЧР frozen pretrained ref decoder мВђмЪ©
    ocsc_anchor_idx: 0                  # мВђмЪ©нХ† anchor index (multi-anchor лѓЄмІАмЫР, 0 лІМ кґМмЮ•)
    ocsc_match_space: pose              # pose / control. control = raw 3D control-space OCSC matching
    ocsc_loss_window_steps: -1          # OCSC loss/CL rollout horizon in 10Hz steps; -1 = full flow_window_steps
    ocsc_loss_temporal_stride: -1       # OCSC loss temporal stride in 10Hz steps; -1 = 2Hz coarse endpoints
    ocsc_strict_active_mask: true       # loss horizon м†Дм≤і valid agent лІМ OCSC нХЩмКµ
    ocsc_position_weight: 1.0           # pos L2 weight
    ocsc_heading_weight: 0.01           # heading (cos/sin) L2 weight
    # вФАвФА soft-RMM propagation diagnostic mode вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
    # mode="soft_rmm_propagation" мЭЉ лХМ OCSCмЭШ closed-loop rollout мГЭмД± к≤љл°Ьл•Љ
    # мЮђмВђмЪ©нХШк≥†, differentiable fast-RMM proxyл•Љ lossл°Ь backpropнХ©лЛИлЛ§.
    soft_rmm_n_rollouts: 4
    soft_rmm_loss_window_steps: 15      # 10Hz step; 15 = 3 coarse frames @ shift=5 = 1.5s
    soft_rmm_min_horizon_steps: 15
    soft_rmm_fields:
      - linear_speed
      - linear_acceleration
      - angular_speed
      - angular_acceleration
    soft_rmm_renormalize_weights: true
    soft_rmm_histogram_temperature: 1.0
    soft_rmm_indicator_temperature: 0.25
    soft_rmm_loss_weight: 1.0
