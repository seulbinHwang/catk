_target_: src.smart.model.smart_flow.SMARTFlow
model_config:
  lr: 0.0005
  lr_warmup_steps: 2
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.01
  weight_decay: 0.01
  lr_scheduler_unit: epoch
  n_rollout_closed_val: 8
  # Optional: set to flow-pretrain CPD value to log DPR (CPD/CPD_ref).
  # CPD/CES are always evaluated regardless of this value.
  wosac_cpd_reference: null
  n_batch_sim_agents_metric: 10
  sim_agents_metric_workers: 3
  # "real": 공식 TF SimAgents RMM (subprocess, 정확), "hard": PyTorch hard RMM (인-프로세스, 빠름)
  validation_metric: "real"
  # true 시 dno/ttc/d_road 커널을 torch.compile 로 최적화 (WOSAC_TORCH_COMPILE=1 env 세팅)
  wosac_torch_compile: false
  n_vis_batch: 0
  n_vis_scenario: 0
  n_vis_rollout: 0
  delete_local_videos_after_wandb_upload: false
  val_open_loop: true
  val_closed_loop: true
  validation_open_seed: 0
  validation_closed_seed: 0
  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "agent_vocab_555_s2.pkl"
    map_token_sampling:
      num_k: 1
      temp: 1.0
    agent_token_sampling:
      num_k: 1
      temp: 1.0
  eval_sampling_noise:
    noise_scale: 1.0
  decoder:
    hidden_dim: 128
    num_freq_bands: 64
    num_heads: 8
    head_dim: 15
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
    flow_dim: 96
    flow_num_chunk_heads: 4
    flow_num_chunk_layers: 2
    flow_solver_steps: 4
    flow_solver_method: midpoint
    flow_solver_eps: 1.0e-3
  sim_agents_submission:
    is_active: false
    method_name: "SMART-flow-7M"
    authors: [Seulbin Hwang, Kiyoung Om]
    affiliation: NaverLabs
    description: Flow-based generative model for simulating realistic agents.
    method_link: "not available yet"
    account_name: "h.sb@naverlabs.com"
  finetune:
    enabled: false
    mode: ocsc_ft
    # FinetuneConfig 기본은 true(velocity_head만). 기존 실험은 전체 flow_decoder FT 유지.
    flow_velocity_head_only: false
    gradient_clip_val: 0.0
