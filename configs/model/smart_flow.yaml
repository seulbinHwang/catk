_target_: src.smart.model.smart_flow.SMARTFlow
model_config:
  lr: 0.0005
  lr_warmup_steps: 2
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.01
  n_rollout_closed_val: 32
  # Optional: set this to the flow-pretrain CPD value only when you want DPR.
  # CPD/CES are always evaluated regardless of this value.
  wosac_cpd_reference: null
  # Fixed WOSAC-CPD/CES normalization scale from the training cache.
  # Order: vehicle, pedestrian, cyclist. Validation/test metrics use this
  # value first; if it is null, validation falls back to GT-derived scale.
  wosac_distribution_type_scale: [22.3461620418, 4.5793447978, 18.5374388830]
  n_batch_sim_agents_metric: 10
  # Positive values auto-set n_batch_sim_agents_metric from world_size and
  # val_batch_size so scorer work is comparable across GPU counts. Set null or
  # 0 to keep the explicit n_batch_sim_agents_metric value.
  scorer_scene_num: 1680
  # Backward-compatible knob. Fast WOSAC runs on the current torch device and
  # no longer launches the old official-scorer worker pool.
  sim_agents_metric_workers: 0
  n_vis_batch: 0
  n_vis_scenario: 0
  n_vis_rollout: 0
  vis_ghost_gt: false
  vis_flow_preview: true
  delete_local_videos_after_wandb_upload: false
  val_open_loop: true
  val_closed_loop: true
  validation_open_seed: 0
  validation_closed_seed: 0
  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "agent_vocab_555_s2.pkl"
    flow_window_steps: ${model.model_config.decoder.flow_window_steps}
    # false: full-window 미래가 모두 유효한 anchor만 학습합니다.
    # true: 18-token / 16-anchor pretrain에서 tail anchor의 유효 prefix만 loss를 줍니다.
    use_prefix_valid_future_loss_mask: true
    # false이면 기존 pose-space Flow Matching을 그대로 사용합니다.
    # true이면 GT pose에서 control label을 on-the-fly로 만들고,
    # Flow Matching은 [delta_s, delta_n, delta_yaw] 제어공간에서 학습합니다.
    use_kinematic_control_flow: true
    # false: vehicle/cyclist는 non-holonomic, pedestrian은 holonomic.
    # true: vehicle/cyclist까지 pedestrian과 같은 holonomic model을 적용합니다.
    use_holonomic_model_only: false
    # true: decoder-consistent rolling supervision으로 GT control label을 만듭니다.
    # false: 각 step의 raw GT pose pair만으로 inverse control label을 만듭니다.
    # use_holonomic_model_only=true일 때는 두 방식이 같은 target을 만듭니다.
    use_rolling_supervision: true
    control_pos_scale_m: 1.0
    # vehicle/cyclist의 non-holonomic no-slip point를 box center 뒤쪽으로
    # box length * 이 비율만큼 옮깁니다. 값은 전체 SMART cache training split에서 추정했습니다.
    control_vehicle_no_slip_point_ratio: 0.2289518863
    control_cyclist_no_slip_point_ratio: 0.0495847873
    # control-space yaw normalization is agent type-aware and config-managed.
    control_vehicle_yaw_scale_rad: 0.025
    control_pedestrian_yaw_scale_rad: 0.20
    control_cyclist_yaw_scale_rad: 0.06
    # control-space 학습에서 GT -> control -> pose 복원 위치 오차가 이 값보다 큰 anchor는 학습에서 제외합니다.
    control_round_trip_max_position_error_m: 0.5
  validation_rollout_sampling:
    sample_steps: 16
    sample_method: euler
    noise_scale: 1.0
  self_forced:
    enabled: false
    start_epoch: 0
    weight: 1.0
    path_step_size: 0.05
    # normalize_direction=false 면 DMD direction 의 거리-나눗셈 제거(raw teacher-fake,
    # 수렴형). path_step_size 가 고정 계수 역할(raw gap 작아 더 큰 값 필요).
    normalize_direction: true
    # ERD entropy temperature beta. 1.0이면 기존 vanilla DMD와 동일하고,
    # 0<beta<1이면 beta*real + (1-beta)*x_t/tau - fake 방향으로 diversity collapse를 완화한다.
    entropy_beta: 1.0
    # clean_dmd_per_channel_normalizer=false(기본): normalizer 를 시간+채널 전체 평균
    # (agent 당 단일 스칼라)으로 — 원본 Self-Forcing(DMD) mean(dim=[1..]) 정합.  죽은
    # 채널(non-holonomic delta_n)은 direction/normalizer 양쪽에서 masking 으로 제외한다.
    # true 면 시간축만 평균(채널별 분모)하던 기존(분모 불안정 → push 폭발) 방식.
    clean_dmd_per_channel_normalizer: false
    # DMD direction normalizer 분모 하한(eps). normalizer=|committed-teacher| 평균이 이
    # 값보다 작으면 floor 로 고정. 기본 0.05 는 수렴 구간 push 증폭(분모 0 근처 폭발)을
    # 강하게 억제한다. 1e-3 으로 낮추면 원본 Self-Forcing(DMD) 정합.
    clean_dmd_normalizer_eps: 0.05
    # DMD optimizer 정합(원본 Self-Forcing): gen/critic 둘 다 Adam betas=(beta1,beta2),
    # weight_decay 적용.  beta1=0.0(momentum 제거)은 critic↔generator non-stationary
    # 동역학의 관성 진동을 막고, weight_decay=0.0 은 pretrain 가중치 침식을 막는다.
    # (AdamW 기본 betas=(0.9,0.999)/wd=0.01 은 self-forced 분기에서 쓰지 않는다.)
    optimizer_beta1: 0.0
    optimizer_beta2: 0.999
    weight_decay: 0.0
    anchor_weight: 0.05
    use_anchor_flow_matching_loss: false
    distribution_matching_objective: dmd
    sid_alpha: 1.0
    sid_normalizer_eps: 1.0e-3
    detach_block_transition: false
    # Stop-motion gate는 전 경로에서 사용하지 않습니다. 값은 false로 고정합니다.
    use_stop_motion: false
    estimator_updates_per_step: 5
    # fake(critic):generator 업데이트 cadence N:1. fake 는 매 batch 1회, generator 는
    # N batch 마다 1회(서로 다른 batch). N=1 이면 매 batch generator 도 업데이트.
    cadence: 1
    # estimator(fake) lr 명시값. null/<=0 이면 lr/estimator_updates_per_step 로 자동.
    estimator_lr: null
    # warmup된 fake critic(F_psi) 초기값 ckpt 경로. null 이면 generator(pretrained)
    # 복사본으로 시작. 지정하면 그 ckpt 의 self_forced_generated_estimator.* 만 로드.
    estimator_init_ckpt: null
    estimator_warmup_epochs: 1
    # 반복 warmup/joint zone 스케줄(step 기준). 둘 다 양수이면 step % (W+J) < W 인
    # 구간은 warmup zone(generator 동결, fake critic 만 학습), 나머지는 joint zone(기존
    # cadence DMD)으로 무한 반복합니다. 둘 중 하나라도 0 이면 비활성(epoch 기반 warmup 사용).
    warmup_zone_steps: 0
    joint_zone_steps: 0
    initialize_aux_from_generator_on_fit_start: true
    unfrozen_range: except_map_encoder
    ema_weight: 0.99
    ema_start_step: 50
    # use_ema=false 면 EMA generator 미사용(online generator 로 eval).
    use_ema: true
    # Manual gradient clip used inside self-forced training_step / estimator
    # update. Lightning's `Trainer(gradient_clip_val=...)` cannot be used
    # because manual optimization is on; the model reads this value and
    # applies clip_gradients() itself.
    gradient_clip_val: 1.0
    sampling:
      sample_steps: 16
      sample_method: euler
      noise_scale: 1.0
      # policy=all: random terminal step을 만들지 않음 → terminal_step_by_agent=None
      #   → (a) 블록 간 context detach 제거(전 horizon으로 gradient 흐름)
      #   → (b) backprop_last_k 경로 사용. backprop_last_k=16=sample_steps 면 16 ODE step 전부 grad.
      # 원본 Self-Forcing 의 gradient truncation(단일 exit step + KV no_grad)과는 정반대
      # 극단(full BPTT + full sampling 역전파)이며, 16-step DMD 신호를 두껍게 주기 위한 선택.
      backprop_last_k: 16
      random_terminal_step:
        enabled: true
        scope: global_batch
        # paper_uniform: 실행 denoising step K를 min_executed_steps..sample_steps 범위에서 균등 샘플링.
        # all: random terminal 미생성(전체 denoising 실행) + 블록 detach 제거.
        policy: all
        min_executed_steps: 16
  decoder:
    hidden_dim: 128
    num_freq_bands: 64
    num_heads: 8
    head_dim: 15
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
    flow_window_steps: 20
    flow_dim: 96
    flow_num_chunk_heads: 4
    flow_num_chunk_layers: 2
    flow_solver_steps: 32
    flow_solver_method: euler
    flow_solver_eps: 1.0e-3
    # Training-only metric memory control. It does not change loss/target/model
    # capacity and only detaches train metric clean reconstruction graphs.
    detach_train_metric_clean: false
    # 아래 control-space 공유 설정은 token_processor 값을 단일 기준으로 사용합니다.
    # decoder 쪽만 다른 값으로 override하면 SMARTFlow 초기화 단계에서 에러를 냅니다.
    use_kinematic_control_flow: ${model.model_config.token_processor.use_kinematic_control_flow}
    use_holonomic_model_only: ${model.model_config.token_processor.use_holonomic_model_only}
    use_rolling_supervision: ${model.model_config.token_processor.use_rolling_supervision}
    control_pos_scale_m: ${model.model_config.token_processor.control_pos_scale_m}
    control_vehicle_no_slip_point_ratio: ${model.model_config.token_processor.control_vehicle_no_slip_point_ratio}
    control_cyclist_no_slip_point_ratio: ${model.model_config.token_processor.control_cyclist_no_slip_point_ratio}
    control_vehicle_yaw_scale_rad: ${model.model_config.token_processor.control_vehicle_yaw_scale_rad}
    control_pedestrian_yaw_scale_rad: ${model.model_config.token_processor.control_pedestrian_yaw_scale_rad}
    control_cyclist_yaw_scale_rad: ${model.model_config.token_processor.control_cyclist_yaw_scale_rad}
    closed_loop_rollout_mode: raw_fm # raw_fm | matched_token_chunk
    use_lqr: false
    use_stop_motion: false
    lqr_commit:
      dt: 0.1
      history_steps: 6
      horizon_steps: 10
      velocity_smooth_lambda: 1.0e-4
      curvature_smooth_lambda: 1.0e-2
      curvature_init_reg: 1.0e-10
      stop_speed_mps: 0.2
      stop_speed_kp: 0.5
      longitudinal_q: 10.0
      longitudinal_r: 0.
      lateral_q_lat: 1.0
      lateral_q_head: 10.0
      lateral_q_kappa: 0.
      lateral_r: 0.
      accel_tau_s: 0.
      curvature_tau_s: 0.
      min_speed_for_curvature_clip_mps: 0.5
  sim_agents_submission:
    is_active: false
    method_name: "SMART-flow-7M"
    authors: [Seulbin Hwang, Kiyoung Om]
    affiliation: NaverLabs
    description: Flow-based generative model for simulating realistic agents.
    method_link: "not available yet"
    account_name: "h.sb@naverlabs.com"
  finetune:
    enabled: false
    train_full_flow_decoder_only: false
