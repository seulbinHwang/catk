_target_: src.smart.model.smart_flow.SMARTFlow
model_config:
  lr: 0.0005
  lr_warmup_steps: 2
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.01
  n_rollout_closed_val: 8
  n_batch_sim_agents_metric: 10
  sim_agents_metric_workers: 3
  n_vis_batch: 0
  n_vis_scenario: 0
  n_vis_rollout: 0
  vis_ghost_gt: false
  vis_flow_2s_preview: true
  delete_local_videos_after_wandb_upload: false
  val_open_loop: true
  val_closed_loop: true
  validation_open_seed: 0
  validation_closed_seed: 0
  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "agent_vocab_555_s2.pkl"
    map_token_sampling:
      num_k: 1
      temp: 1.0
    agent_token_sampling:
      num_k: 1
      temp: 1.0
  validation_rollout_sampling:
    sample_steps: 16
    sample_method: midpoint
    noise_scale: 1.0
  draft:
    enabled: false
    penalty_type: physics # physics | lqr
    start_epoch: 0
    ramp_epochs: 4
    max_weight: 0.1
    gt_excess_only: false
    sampling:
      sample_steps: 16
      sample_method: midpoint
      noise_scale: 1.0
      backprop_last_k: null
    lqr:
      force_fp32: true
    physics:
      force_fp32: true
      dt: 0.1
      pos_scale_m: 20.0
      deadzone_ratio: 0.02
      deadzone_softness: 0.02
      speed_weight: 1.0
      slip_weight: 1.0
      accel_weight: 1.0
      yaw_accel_weight: 1.0
      turn_weight: 1.0
      eps: 1.0e-6
  decoder:
    hidden_dim: 128
    num_freq_bands: 64
    num_heads: 8
    head_dim: 15
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
    flow_dim: 96
    flow_num_chunk_heads: 4
    flow_num_chunk_layers: 2
    flow_solver_steps: 16
    flow_solver_method: midpoint
    flow_solver_eps: 1.0e-3
    closed_loop_rollout_mode: raw_fm # raw_fm | matched_token_chunk
    use_lqr: true
    use_stop_motion: true
    lqr_commit:
      dt: 0.1
      history_steps: 6
      horizon_steps: 10
      velocity_smooth_lambda: 1.0e-4
      curvature_smooth_lambda: 1.0e-2
      curvature_init_reg: 1.0e-10
      stop_speed_mps: 0.2
      stop_speed_kp: 0.5
      longitudinal_q: 10.0
      longitudinal_r: 0.
      lateral_q_lat: 1.0
      lateral_q_head: 10.0
      lateral_q_kappa: 0.
      lateral_r: 0.
      clip_longitudinal_command: true
      clip_lateral_projection_and_final_curvature_state: true
      accel_tau_s: 0.
      curvature_tau_s: 0.
      min_speed_for_curvature_clip_mps: 0.5
  sim_agents_submission:
    is_active: false
    method_name: "SMART-flow-7M"
    authors: [Seulbin Hwang, Kiyoung Om]
    affiliation: NaverLabs
    description: Flow-based generative model for simulating realistic agents.
    method_link: "not available yet"
    account_name: "h.sb@naverlabs.com"
  finetune:
    enabled: false
    train_full_flow_decoder_only: false
