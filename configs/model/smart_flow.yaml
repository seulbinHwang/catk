_target_: src.smart.model.smart_flow.SMARTFlow
model_config:
  lr: 0.0005
  lr_warmup_steps: 2
  lr_total_steps: ${trainer.max_epochs}
  lr_min_ratio: 0.01
  n_rollout_closed_val: 8
  # Optional: set this to the flow-pretrain CPD value only when you want DPR.
  # CPD/CES are always evaluated regardless of this value.
  wosac_cpd_reference: null
  n_batch_sim_agents_metric: 10
  # Positive values auto-set n_batch_sim_agents_metric from world_size and
  # val_batch_size so scorer work is comparable across GPU counts. Set null or
  # 0 to keep the explicit n_batch_sim_agents_metric value.
  scorer_scene_num: 840
  sim_agents_metric_workers: 3
  n_vis_batch: 0
  n_vis_scenario: 0
  n_vis_rollout: 0
  vis_ghost_gt: false
  vis_flow_preview: true
  delete_local_videos_after_wandb_upload: false
  val_open_loop: true
  val_closed_loop: true
  validation_open_seed: 0
  validation_closed_seed: 0
  token_processor:
    map_token_file: "map_traj_token5.pkl"
    agent_token_file: "agent_vocab_555_s2.pkl"
    flow_window_steps: ${model.model_config.decoder.flow_window_steps}
    map_token_sampling:
      num_k: 1
      temp: 1.0
    agent_token_sampling:
      num_k: 1
      temp: 1.0
  validation_rollout_sampling:
    sample_steps: 32
    sample_method: euler
    noise_scale: 1.0
  draft:
    enabled: false
    start_epoch: 0
    ramp_epochs: 4
    max_weight: 1.0
    sampling:
      sample_steps: 32
      sample_method: euler
      noise_scale: 1.0
      random_terminal_step:
        enabled: true
        scope: global_batch
        # paper_uniform: 실행 denoising step K를 min_executed_steps..sample_steps 범위에서 균등 샘플링합니다.
        policy: paper_uniform
        min_executed_steps: 24
    physics:
      force_fp32: true
      dt: 0.1
      pos_scale_m: 20.0
      speed_floor_mps: 0.5
      vehicle_v_max_mps: 35.0
      vehicle_a_max_mps2: 8.0
      vehicle_lat_accel_max_mps2: 4.2
      bicycle_v_max_mps: 22.0
      bicycle_a_max_mps2: 5.5
      bicycle_lat_accel_max_mps2: 4.4
      pedestrian_v_max_mps: 5.0
      pedestrian_a_max_mps2: 4.7
      vehicle_wheelbase_scale: 0.60
      bicycle_wheelbase_scale: 0.85
      vehicle_steer_max_rad: 0.55
      bicycle_steer_max_rad: 0.90
      vehicle_steer_rate_max_radps: 0.8
      bicycle_steer_rate_max_radps: 1.4
      soft_weight: 0.25
      compare_softness_to_gt: false
      pedestrian_heading_weight: 0.05
      pedestrian_heading_speed_threshold_mps: 0.5
      eps: 1.0e-6
  self_forced:
    enabled: false
    start_epoch: 0
    weight: 1.0
    path_step_size: 0.05
    anchor_weight: 0.05
    use_anchor_flow_matching_loss: false
    distribution_matching_objective: dmd
    sid_alpha: 1.0
    sid_normalizer_eps: 1.0e-3
    detach_block_transition: false
    estimator_updates_per_step: 5
    estimator_warmup_epochs: 0
    initialize_aux_from_generator_on_fit_start: true
    unfrozen_range: except_map_encoder
    ema_weight: 0.99
    ema_start_step: 50
    # Manual gradient clip used inside self-forced training_step / estimator
    # update. Lightning's `Trainer(gradient_clip_val=...)` cannot be used
    # because manual optimization is on; the model reads this value and
    # applies clip_gradients() itself.
    gradient_clip_val: 1.0
    sampling:
      sample_steps: 32
      sample_method: euler
      noise_scale: 1.0
      random_terminal_step:
        enabled: true
        scope: global_batch
        # paper_uniform: 실행 denoising step K를 min_executed_steps..sample_steps 범위에서 균등 샘플링합니다.
        policy: paper_uniform
        min_executed_steps: 24
    use_control_space_physics_regularization: false
    physics_weight: 0.005
    physics:
      force_fp32: true
      dt: 0.1
      pos_scale_m: 20.0
      speed_floor_mps: 0.5
      vehicle_v_max_mps: 35.0
      vehicle_a_max_mps2: 8.0
      vehicle_lat_accel_max_mps2: 4.2
      bicycle_v_max_mps: 22.0
      bicycle_a_max_mps2: 5.5
      bicycle_lat_accel_max_mps2: 4.4
      pedestrian_v_max_mps: 5.0
      pedestrian_a_max_mps2: 4.7
      vehicle_wheelbase_scale: 0.60
      bicycle_wheelbase_scale: 0.85
      vehicle_steer_max_rad: 0.55
      bicycle_steer_max_rad: 0.90
      vehicle_steer_rate_max_radps: 0.8
      bicycle_steer_rate_max_radps: 1.4
      soft_weight: 0.25
      compare_softness_to_gt: false
      pedestrian_heading_weight: 0.05
      pedestrian_heading_speed_threshold_mps: 0.5
      eps: 1.0e-6
  decoder:
    hidden_dim: 128
    num_freq_bands: 64
    num_heads: 8
    head_dim: 15
    dropout: 0.1
    hist_drop_prob: 0.1
    num_map_layers: 3
    num_agent_layers: 6
    pl2pl_radius: 10
    pl2a_radius: 30
    a2a_radius: 60
    time_span: 30
    num_historical_steps: 11
    num_future_steps: 80
    flow_window_steps: 20
    flow_dim: 96
    flow_num_chunk_heads: 4
    flow_num_chunk_layers: 2
    flow_solver_steps: 32
    flow_solver_method: euler
    flow_solver_eps: 1.0e-3
    closed_loop_rollout_mode: raw_fm # raw_fm | matched_token_chunk
    use_lqr: false
    use_stop_motion: true
    lqr_commit:
      dt: 0.1
      history_steps: 6
      horizon_steps: 10
      velocity_smooth_lambda: 1.0e-4
      curvature_smooth_lambda: 1.0e-2
      curvature_init_reg: 1.0e-10
      stop_speed_mps: 0.2
      stop_speed_kp: 0.5
      longitudinal_q: 10.0
      longitudinal_r: 0.
      lateral_q_lat: 1.0
      lateral_q_head: 10.0
      lateral_q_kappa: 0.
      lateral_r: 0.
      accel_tau_s: 0.
      curvature_tau_s: 0.
      min_speed_for_curvature_clip_mps: 0.5
  sim_agents_submission:
    is_active: false
    method_name: "SMART-flow-7M"
    authors: [Seulbin Hwang, Kiyoung Om]
    affiliation: NaverLabs
    description: Flow-based generative model for simulating realistic agents.
    method_link: "not available yet"
    account_name: "h.sb@naverlabs.com"
  finetune:
    enabled: false
    train_full_flow_decoder_only: false
