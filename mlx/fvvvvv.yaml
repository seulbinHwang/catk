apiVersion: v1
kind: Pod
metadata:
  annotations:
    kubernetes.io/limit-ranger: 'LimitRanger plugin set: cpu, memory request for init container install-nubescli; cpu, memory limit for init container install-nubescli'
    mlx.navercorp.com/created-by: system:serviceaccount:a-nl10383:default
    mlx.navercorp.com/requested-by: system:serviceaccount:a-nl10383:default
    mlx.navercorp.com/updated-by: system:serviceaccount:a-nl10383:default
    sidecar.istio.io/inject: 'false'
  labels:
    management.mlx.navercorp.com/project: pnc
    management.mlx.navercorp.com/workspace: naverlabs
    mlx.navercorp.com/esm-code: A013970
    mlx.navercorp.com/is-gpu-requested: ''
    mlx.navercorp.com/scheduled-by: admission-webhook
    mlx.navercorp.com/top-owner-kind: v1.Pod
    mlx.navercorp.com/top-owner-name: fvvvvv
  name: fvvvvv
  namespace: p-pnc
spec:
  affinity:
    nodeAffinity: {}
  containers:
  - args:
    - "set -Eeo pipefail\numask 002\nexport CACHE_ROOT=/workspace/womd_v1_3/SMART_cache\ntrap 'echo \"Exit (code $?) - keeping pod alive for inspection\"; sleep infinity' EXIT\n\nexport LANG=ko_KR.utf8\nexport LANGUAGE=ko_KR:ko\nexport LC_ALL=ko_KR.utf8\nexport LC_CTYPE=ko_KR.utf8\nexport TERM=xterm-256color\n\nexport PATH=/mnt/nuplan/miniforge/bin:$PATH\nif [ -f /mnt/nuplan/miniforge/etc/profile.d/conda.sh ]; then\n  source /mnt/nuplan/miniforge/etc/profile.d/conda.sh\n  conda activate catk 2>/dev/null || conda activate base 2>/dev/null || true\n  echo \"[startup] conda activated: $(conda info --envs | grep '*')\"\nelse\n  echo \"[startup] /mnt/nuplan/miniforge not found - using image default python\"\nfi\n\nif command -v pip &>/dev/null; then\n  pip install --no-cache-dir wandb || echo \"[startup] pip install wandb failed - continuing\"\n  if [ -n \"${WANDB_API_KEY:-}\" ]; then\n    wandb login --relogin \"$WANDB_API_KEY\" || echo \"[startup] wandb login failed - continuing\"\n  fi\nelse\n  echo \"[startup] pip not found - skipping wandb setup\"\nfi\n\nmkdir -p \"$HOME\"\n\ncat >> \"$HOME/.bashrc\" <<'RCEOF'\nexport CACHE_ROOT=/workspace/womd_v1_3/SMART_cache\nif [ -f /mnt/nuplan/miniforge/etc/profile.d/conda.sh ]; then\n  source /mnt/nuplan/miniforge/etc/profile.d/conda.sh\n  conda activate catk 2>/dev/null || conda activate base 2>/dev/null || true\nfi\nRCEOF\n\nif infocmp tmux-256color >/dev/null 2>&1; then\n  TMUX_TERM=\"tmux-256color\"\nelse\n  TMUX_TERM=\"screen-256color\"\nfi\n\ncat > \"$HOME/.tmux.conf\" <<EOF\nset -g mouse on\nset -g history-limit 100000\nsetw -g mode-keys vi\nset -g default-terminal \"$TMUX_TERM\"\nset -g default-command \"/bin/bash\"\nEOF\n\nif [ ! -d \"$PROJECT_ROOT/.git\" ]; then\n  echo \"[startup] PROJECT_ROOT not found - cloning repository into emptyDir\"\n  mkdir -p \"$(dirname \"$PROJECT_ROOT\")\"\n  git clone https://github.com/seulbinHwang/catk.git \"$PROJECT_ROOT\" || true\nfi\n\nif [ ! -d \"$PROJECT_ROOT/.git\" ]; then\n  echo \"[startup] PROJECT_ROOT is invalid: $PROJECT_ROOT\"\n  exit 1\nfi\n\ngit config --global --add safe.directory \"$PROJECT_ROOT\"\ncd \"$PROJECT_ROOT\"\nif git fetch origin semi_control_stable_original; then\n  git checkout semi_control_stable_original 2>/dev/null || git checkout -b semi_control_stable_original origin/semi_control_stable_original\n  git pull --ff-only origin semi_control_stable_original || true\nelse\n  echo \"[startup] git fetch failed - keeping current checkout\"\nfi\n\nSESSION_NAME=\"npc-training-v100\"\ntmux new-session -d -s \"$SESSION_NAME\" -c \"$PROJECT_ROOT\" || true\ntmux split-window -h -t \"$SESSION_NAME:0\" -c \"$PROJECT_ROOT\" || true\ntmux select-layout -t \"$SESSION_NAME\" even-horizontal || true\n\necho \"Started tmux session '$SESSION_NAME'.\"\necho \"Claude path: $(command -v claude || echo unavailable)\"\nclaude --version || true\necho \"Headless login help: /mnt/nuplan/tools/claude-login-help\"\n/mnt/nuplan/tools/claude-login-help || true\n\nsleep infinity\n"
    command:
    - /bin/bash
    - -c
    env:
    - name: LANG
      value: ko_KR.utf8
    - name: LANGUAGE
      value: ko_KR:ko
    - name: LC_ALL
      value: ko_KR.utf8
    - name: LC_CTYPE
      value: ko_KR.utf8
    - name: TERM
      value: xterm-256color
    - name: PROJECT_ROOT
      value: /mnt/nuplan/projects/catk
    - name: HOME
      value: /mnt/nuplan/home
    - name: PATH
      value: /mnt/nuplan/miniforge/envs/catk/bin:/mnt/nuplan/miniforge/bin:/mnt/nuplan/tools:/mnt/nuplan/home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    - name: NUBES_GATEWAY_ADDRESS
      value: c.nubes.sto.navercorp.com:8000
    - name: WANDB_API_KEY
      valueFrom:
        secretKeyRef:
          key: api-key
          name: wandb-secret
    - name: WANDB_ENTITY
      value: jksg01019-naver-labs
    - name: WANDB_PROJECT
      value: SMART-FLOW
    - name: WANDB_MODE
      value: online
    - name: N3R_CLUSTER_NAME
      value: pgrsw2
    - name: N3R_CLUSTER_NETWORK
      value: production
    - name: N3R_CLUSTER_PHASE
      value: production
    - name: TZ
      value: Asia/Seoul
    image: labs-ad2flow.n3r.reg.navercorp.com/mlx_exp/pnc_traffic_model:20260519
    name: main
    resources:
      limits:
        cpu: '32'
        memory: 480Gi
        nvidia.com/gpu: '3'
      requests:
        cpu: '32'
        memory: 128Gi
        nvidia.com/gpu: '3'
    securityContext:
      allowPrivilegeEscalation: false
    volumeMounts:
    - mountPath: /mnt/nuplan
      name: nuplan-storage
    - mountPath: /dev/shm
      name: dshm2
  imagePullSecrets:
  - name: pnc-secret
  initContainers:
  - command:
    - /bin/sh
    - -c
    - for gpu in $(seq 0 2); do echo "Validating GPU $gpu/2"; ok=0; for i in 1 2 3; do CUDA_VISIBLE_DEVICES=$gpu timeout 30s /tmp/vectorAdd && ok=1 && break || sleep 5; done; [ $ok -eq 0 ] && echo "GPU $gpu FAILED" && exit 1; echo "GPU $gpu PASSED"; done
    env:
    - name: N3R_CLUSTER_NAME
      value: pgrsw2
    - name: N3R_CLUSTER_NETWORK
      value: production
    - name: N3R_CLUSTER_PHASE
      value: production
    - name: TZ
      value: Asia/Seoul
    image: mlx.n3r.reg.navercorp.com/mlx/cuda-sample:vectoradd-cuda11.7.1-ubuntu20.04
    name: cuda-validator
    resources:
      limits:
        cpu: 1500m
        memory: 1500Mi
        nvidia.com/gpu: '3'
      requests:
        cpu: 1500m
        memory: 1500Mi
        nvidia.com/gpu: '3'
  - command:
    - /bin/bash
    - -c
    - "set -Eeuo pipefail\numask 002\nmkdir -p /mnt/nuplan/tools /mnt/nuplan/logs\nif [ ! -s /mnt/nuplan/tools/nubescli ]; then\n  echo \"[init] nubescli not found - downloading...\"\n  if curl -fsSL -o /mnt/nuplan/tools/nubescli \\\n    http://owfsrepo.navercorp.com/nubes/dist/nubescli_latest/linux/nubescli; then\n    chmod +x /mnt/nuplan/tools/nubescli\n  else\n    echo \"[init] failed to download nubescli - continuing with a stub wrapper\"\n    cat > /mnt/nuplan/tools/nubescli <<'EOF'\n#!/usr/bin/env bash\necho \"[nubescli wrapper] nubescli is unavailable in this pod.\" >&2\nexit 1\nEOF\n    chmod +x /mnt/nuplan/tools/nubescli\n  fi\nfi\n"
    env:
    - name: N3R_CLUSTER_NAME
      value: pgrsw2
    - name: N3R_CLUSTER_NETWORK
      value: production
    - name: N3R_CLUSTER_PHASE
      value: production
    - name: TZ
      value: Asia/Seoul
    image: labs-ad2flow.n3r.reg.navercorp.com/mlx_exp/pnc_traffic_model:20260519
    name: install-nubescli
    resources:
      limits:
        cpu: 100m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 1Gi
    securityContext:
      allowPrivilegeEscalation: false
    volumeMounts:
    - mountPath: /mnt/nuplan
      name: nuplan-storage
  - command:
    - /bin/bash
    - -c
    - "set -Eeuo pipefail\numask 002\nMINIFORGE_DIR=/mnt/nuplan/miniforge\nif [ -x \"$MINIFORGE_DIR/bin/conda\" ]; then\n  echo \"[init] miniforge already installed - skip\"\nelse\n  echo \"[init] Installing Miniforge...\"\n  curl -fsSL -o /tmp/miniforge.sh \\\n    https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh\n  bash /tmp/miniforge.sh -b -p \"$MINIFORGE_DIR\"\n  rm -f /tmp/miniforge.sh\nfi\nexport PATH=\"$MINIFORGE_DIR/bin:$PATH\"\nsource \"$MINIFORGE_DIR/etc/profile.d/conda.sh\"\nconda activate base\nif conda env list | awk '{print $1}' | grep -qx catk; then\n  echo \"[init] catk env already exists - skip creation\"\nelse\n  conda create -y -n catk python=3.11.9\nfi\nconda activate catk\npip install --no-cache-dir wandb || echo \"[init] wandb install failed - continuing\"\nconda info --envs\n"
    env:
    - name: N3R_CLUSTER_NAME
      value: pgrsw2
    - name: N3R_CLUSTER_NETWORK
      value: production
    - name: N3R_CLUSTER_PHASE
      value: production
    - name: TZ
      value: Asia/Seoul
    image: labs-ad2flow.n3r.reg.navercorp.com/mlx_exp/pnc_traffic_model:20260519
    name: setup-miniforge
    resources:
      limits:
        cpu: '4'
        memory: 16Gi
      requests:
        cpu: '4'
        memory: 16Gi
    securityContext:
      allowPrivilegeEscalation: false
    volumeMounts:
    - mountPath: /mnt/nuplan
      name: nuplan-storage
  - command:
    - /bin/bash
    - -c
    - "set -Eeuo pipefail\numask 002\nexport HOME=/mnt/nuplan/home\nexport PATH=\"$HOME/.local/bin:/mnt/nuplan/tools:$PATH\"\nmkdir -p /mnt/nuplan/tools \"$HOME/.local/bin\" \"$HOME/.claude\"\nchmod 700 \"$HOME/.claude\"\nINSTALL_LOG=$(mktemp)\nif ! curl -fsSL https://claude.ai/install.sh | bash 2>&1 | tee \"$INSTALL_LOG\"; then\n  echo \"[init] Claude Code installation failed\" >&2\n  exit 1\nfi\nfor rc in \"$HOME/.bashrc\" \"$HOME/.zshrc\"; do\n  touch \"$rc\"\n  if ! grep -qxF 'export PATH=\"$HOME/.local/bin:$PATH\"' \"$rc\"; then\n    printf '\\nexport PATH=\"$HOME/.local/bin:$PATH\"\\n' >> \"$rc\"\n  fi\ndone\nif [ ! -x \"$HOME/.local/bin/claude\" ]; then\n  echo \"[init] expected Claude Code launcher not found at $HOME/.local/bin/claude\" >&2\n  find \"$HOME\" -maxdepth 5 -type f -name claude -perm -111 || true\n  exit 1\nfi\nln -sf \"$HOME/.local/bin/claude\" /mnt/nuplan/tools/claude\ncat > /mnt/nuplan/tools/claude-login-help <<'EOF'\n#!/usr/bin/env bash\ncat <<'EOT'\nClaude Code headless first login:\n1. Run: claude\n2. Select: Claude account with subscription\n3. Open the printed login URL on a separate browser-enabled device\n4. Finish SSO there and copy the returned code\n5. Paste that code back into this terminal\n6. Verify with: claude\n   Then run /status inside Claude Code if needed\nEOT\nEOF\nchmod +x /mnt/nuplan/tools/claude-login-help\n/mnt/nuplan/tools/claude --version\n"
    env:
    - name: N3R_CLUSTER_NAME
      value: pgrsw2
    - name: N3R_CLUSTER_NETWORK
      value: production
    - name: N3R_CLUSTER_PHASE
      value: production
    - name: TZ
      value: Asia/Seoul
    image: labs-ad2flow.n3r.reg.navercorp.com/mlx_exp/pnc_traffic_model:20260519
    name: setup-claude-code
    resources:
      limits:
        cpu: '2'
        memory: 8Gi
      requests:
        cpu: '2'
        memory: 8Gi
    securityContext:
      allowPrivilegeEscalation: false
    volumeMounts:
    - mountPath: /mnt/nuplan
      name: nuplan-storage
  nodeSelector:
    mlx.navercorp.com/hardware-type: gpu
    mlx.navercorp.com/zone: private-v100-naverlabs-0
  restartPolicy: OnFailure
  securityContext:
    fsGroup: 1000
    sysctls:
    - name: net.ipv4.tcp_keepalive_intvl
      value: '20'
    - name: net.ipv4.tcp_keepalive_probes
      value: '3'
    - name: net.ipv4.tcp_keepalive_time
      value: '600'
  serviceAccountName: default
  terminationGracePeriodSeconds: 120
  volumes:
  - emptyDir: {}
    name: nuplan-storage
  - emptyDir:
      medium: Memory
      sizeLimit: 256Gi
    name: dshm2
