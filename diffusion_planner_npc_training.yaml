apiVersion: v1
kind: Pod
metadata:
  name: hsb-npc-training
  namespace: p-pnc
  annotations:
    sidecar.istio.io/inject: "false"
spec:
  terminationGracePeriodSeconds: 120
  restartPolicy: OnFailure
  nodeSelector:
    mlx.navercorp.com/zone: private-h100-ib-naverlabs-0

  imagePullSecrets:
    - name: pnc-secret

  securityContext:
    fsGroup: 1000

  volumes:
    - name: nuplan-storage
      persistentVolumeClaim:
        claimName: pvc-rbd-diffusion-planner-djkim
    - name: dshm2
      emptyDir:
        medium: Memory
        sizeLimit: 256Gi

  initContainers:
    - name: install-nubescli
      image: labs-ad2flow.n3r.reg.navercorp.com/mlx_exp/pnc_traffic_model:20260121
      securityContext:
        allowPrivilegeEscalation: false
      command:
        - /bin/bash
        - -c
        - |
          set -Eeuo pipefail
          umask 002

          mkdir -p /mnt/nuplan/tools
          mkdir -p /mnt/nuplan/logs

          if [ ! -s /mnt/nuplan/tools/nubescli ]; then
            echo "[init] nubescli not found - downloading..."
            curl -fsSL -o /mnt/nuplan/tools/nubescli \
              http://owfsrepo.navercorp.com/nubes/dist/nubescli_latest/linux/nubescli
            chmod +x /mnt/nuplan/tools/nubescli
          else
            echo "[init] nubescli already exists - skip download"
          fi
      volumeMounts:
        - name: nuplan-storage
          mountPath: /mnt/nuplan

  containers:
    - name: main
      image: labs-ad2flow.n3r.reg.navercorp.com/mlx_exp/pnc_traffic_model:20260121
      securityContext:
        allowPrivilegeEscalation: false

      env:
        - name: LANG
          value: "ko_KR.utf8"
        - name: LANGUAGE
          value: "ko_KR:ko"
        - name: LC_ALL
          value: "ko_KR.utf8"
        - name: LC_CTYPE
          value: "ko_KR.utf8"
        - name: TERM
          value: "xterm-256color"
        - name: PATH
          value: "/mnt/nuplan/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: NUBES_GATEWAY_ADDRESS
          value: "c.nubes.sto.navercorp.com:8000"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: WANDB_ENTITY
          value: "jksg01019-naver-labs"
        - name: WANDB_PROJECT
          value: "Diffusion-Planner"
        - name: WANDB_MODE
          value: "online"

      command: ["/bin/bash", "-c"]
      args:
        - |
          set -Eeo pipefail
          umask 002
          trap 'echo "Exit (code $?) - keeping pod alive for inspection"; sleep infinity' EXIT

          export LANG=ko_KR.utf8
          export LANGUAGE=ko_KR:ko
          export LC_ALL=ko_KR.utf8
          export LC_CTYPE=ko_KR.utf8
          export TERM=xterm-256color

          export PATH=/mnt/work/miniforge/bin:$PATH
          source /mnt/nuplan/miniforge/etc/profile.d/conda.sh
          conda activate base
          conda activate diffusion_planner_fa

          pip install --no-cache-dir wandb
          wandb login --relogin "$WANDB_API_KEY"

          mkdir -p "$HOME"

          if infocmp tmux-256color >/dev/null 2>&1; then
            TMUX_TERM="tmux-256color"
          else
            TMUX_TERM="screen-256color"
          fi

          cat > "$HOME/.tmux.conf" <<EOF
          set -g mouse on
          set -g history-limit 100000
          setw -g mode-keys vi
          set -g default-terminal "$TMUX_TERM"
          EOF

          git config --global --add safe.directory /mnt/nuplan/projects/Diffusion-Planner

          cd /mnt/nuplan/projects/Diffusion-Planner
          git fetch
          git stash
          if [ "$(git rev-parse --abbrev-ref HEAD)" = "feature/womd" ]; then
            git checkout main
          fi
          git branch -D feature/womd 2>/dev/null || true
          git checkout -b feature/womd origin/feature/womd
          git pull

          SESSION_NAME="npc-training"
          tmux new-session -d -s "$SESSION_NAME"
          tmux split-window -h -t "$SESSION_NAME:0"
          tmux send-keys -t "$SESSION_NAME:0.1" \
            "cd /mnt/nuplan/projects/Diffusion-Planner" C-m
          tmux select-layout -t "$SESSION_NAME" even-horizontal

          echo "Started tmux session '$SESSION_NAME'."
          sleep infinity

      resources:
        requests:
          cpu: "32"
          memory: "1000Gi"
          nvidia.com/gpu: "6"
        limits:
          cpu: "32"
          memory: "1000Gi"
          nvidia.com/gpu: "6"

      volumeMounts:
        - name: nuplan-storage
          mountPath: /mnt/nuplan
        - name: dshm2
          mountPath: /dev/shm